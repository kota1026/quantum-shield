<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lock Confirm - Token Hub | Quantum Shield</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0c;
            --bg-secondary: #111114;
            --bg-elevated: #18181c;
            --bg-card: #0e0e11;
            --accent-hinomaru: #bc002d;
            --accent-hinomaru-light: #e8334d;
            --accent-hinomaru-dim: rgba(188, 0, 45, 0.12);
            --accent-hinomaru-glow: rgba(188, 0, 45, 0.4);
            --accent-gold: #c9a962;
            --accent-gold-dim: rgba(201, 169, 98, 0.12);
            --accent-gold-glow: rgba(201, 169, 98, 0.3);
            --success: #00c896;
            --success-dim: rgba(0, 200, 150, 0.12);
            --warning: #f0a030;
            --warning-dim: rgba(240, 160, 48, 0.12);
            --text-primary: #f8f8fa;
            --text-secondary: #9898a0;
            --text-tertiary: #606068;
            --border-subtle: rgba(255, 255, 255, 0.04);
            --border-default: rgba(255, 255, 255, 0.08);
            --font-body: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
            --font-mono: 'DM Mono', monospace;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-2xl: 48px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 20px;
            --radius-full: 9999px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body); background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; line-height: 1.5; }

        .premium-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .gold-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 600px; background: radial-gradient(circle, var(--accent-gold-dim), transparent 60%); opacity: 0.4; }
        .noise { position: absolute; inset: 0; opacity: 0.02; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }

        .container { position: relative; z-index: 1; max-width: 550px; margin: 0 auto; padding: var(--space-xl); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }

        .steps { display: flex; justify-content: center; align-items: center; gap: var(--space-md); margin-bottom: var(--space-2xl); }
        .step { display: flex; align-items: center; gap: var(--space-sm); }
        .step-number { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; background: var(--bg-secondary); border: 1px solid var(--border-default); color: var(--text-tertiary); }
        .step.completed .step-number { background: var(--success); border-color: var(--success); color: white; }
        .step.active .step-number { background: var(--accent-gold); border-color: var(--accent-gold); color: var(--bg-primary); }
        .step-label { font-size: 14px; color: var(--text-tertiary); }
        .step.active .step-label { color: var(--text-primary); }
        .step.completed .step-label { color: var(--success); }
        .step-connector { width: 40px; height: 2px; background: var(--border-default); }
        .step-connector.completed { background: var(--success); }

        .card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); overflow: hidden; }
        .card-header { padding: var(--space-lg) var(--space-xl); border-bottom: 1px solid var(--border-subtle); text-align: center; }
        .card-title { font-size: 24px; font-weight: 600; }
        .card-body { padding: var(--space-xl); }

        .confirm-visual { text-align: center; padding: var(--space-xl) 0; }
        .confirm-icon { width: 100px; height: 100px; margin: 0 auto var(--space-lg); background: linear-gradient(135deg, var(--accent-gold-dim), var(--accent-gold-glow)); border: 2px solid var(--accent-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 48px; animation: icon-pulse 2s ease-in-out infinite; }
        @keyframes icon-pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 20px var(--accent-gold-glow); } 50% { transform: scale(1.05); box-shadow: 0 0 40px var(--accent-gold-glow); } }

        .summary-box { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: var(--space-lg); margin-bottom: var(--space-xl); }
        .summary-row { display: flex; justify-content: space-between; padding: var(--space-sm) 0; }
        .summary-row:not(:last-child) { border-bottom: 1px solid var(--border-subtle); }
        .summary-label { color: var(--text-tertiary); font-size: 14px; }
        .summary-value { font-family: var(--font-mono); font-weight: 500; font-size: 14px; }
        .summary-value.gold { color: var(--accent-gold); }

        .warning-box { background: var(--warning-dim); border: 1px solid var(--warning); border-radius: var(--radius-md); padding: var(--space-md); margin-bottom: var(--space-xl); display: flex; gap: var(--space-sm); }
        .warning-icon { font-size: 16px; }
        .warning-text { font-size: 13px; color: var(--warning); line-height: 1.5; }

        .checkbox-group { margin-bottom: var(--space-xl); }
        .checkbox-item { display: flex; align-items: flex-start; gap: var(--space-md); padding: var(--space-md); background: var(--bg-secondary); border-radius: var(--radius-md); margin-bottom: var(--space-sm); cursor: pointer; transition: background 0.2s; }
        .checkbox-item:hover { background: var(--bg-elevated); }
        .checkbox-item input { display: none; }
        .checkbox-box { width: 24px; height: 24px; border: 2px solid var(--border-default); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
        .checkbox-item input:checked + .checkbox-box { background: var(--accent-gold); border-color: var(--accent-gold); }
        .checkbox-item input:checked + .checkbox-box::after { content: '✓'; color: var(--bg-primary); font-size: 14px; font-weight: 600; }
        .checkbox-text { font-size: 14px; color: var(--text-secondary); }

        .btn-group { display: flex; gap: var(--space-md); }
        .btn-primary { flex: 1; padding: 16px; background: linear-gradient(135deg, var(--accent-hinomaru), var(--accent-hinomaru-light)); border: none; border-radius: var(--radius-lg); color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; text-align: center; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent-hinomaru-glow); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-secondary { flex: 1; padding: 16px; background: transparent; border: 1px solid var(--border-default); border-radius: var(--radius-lg); color: var(--text-secondary); font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.2s; text-decoration: none; text-align: center; }
        .btn-secondary:hover { border-color: var(--accent-gold); color: var(--accent-gold); }

        .gas-info { text-align: center; margin-top: var(--space-md); font-size: 12px; color: var(--text-tertiary); }
    </style>
</head>
<body>
    <div class="premium-bg">
        <div class="gold-glow"></div>
        <div class="noise"></div>
    </div>

    <div class="container">
        <div class="steps">
            <div class="step completed">
                <span class="step-number">✓</span>
                <span class="step-label">Input</span>
            </div>
            <span class="step-connector completed"></span>
            <div class="step completed">
                <span class="step-number">✓</span>
                <span class="step-label">Preview</span>
            </div>
            <span class="step-connector completed"></span>
            <div class="step active">
                <span class="step-number">3</span>
                <span class="step-label">Confirm</span>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h1 class="card-title">🔐 Confirm Lock</h1>
            </div>
            <div class="card-body">
                <div class="confirm-visual">
                    <div class="confirm-icon">🔒</div>
                </div>

                <div class="summary-box">
                    <div class="summary-row">
                        <span class="summary-label">Lock Amount</span>
                        <span class="summary-value">5,000 QS</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">Lock Period</span>
                        <span class="summary-value">2 Years</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">veQS Received</span>
                        <span class="summary-value gold">2,500 veQS</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">Unlock Date</span>
                        <span class="summary-value">2028-01-08</span>
                    </div>
                </div>

                <div class="warning-box">
                    <span class="warning-icon">⚠️</span>
                    <div class="warning-text">
                        <strong>重要:</strong> ロック期間中はQSを引き出すことができません。この操作は取り消せません。
                    </div>
                </div>

                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" onchange="checkAll()">
                        <span class="checkbox-box"></span>
                        <span class="checkbox-text">ロック期間中（2年間）QSを引き出せないことを理解しています</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" onchange="checkAll()">
                        <span class="checkbox-box"></span>
                        <span class="checkbox-text">veQSは時間経過とともに減衰することを理解しています</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" onchange="checkAll()">
                        <span class="checkbox-box"></span>
                        <span class="checkbox-text">この操作が不可逆であることを理解しています</span>
                    </label>
                </div>

                <div class="btn-group">
                    <a href="02_lock_preview.html" class="btn-secondary">Cancel</a>
                    <a href="02_lock_success.html" class="btn-primary" id="lockBtn" style="pointer-events: none; opacity: 0.5;">Lock 5,000 QS</a>
                </div>

                <div class="gas-info">Estimated Gas: ~0.002 ETH</div>
            </div>
        </div>
    </div>

    <script>
        function checkAll() {
            const checkboxes = document.querySelectorAll('.checkbox-item input');
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);
            const btn = document.getElementById('lockBtn');
            if (allChecked) {
                btn.style.pointerEvents = 'auto';
                btn.style.opacity = '1';
            } else {
                btn.style.pointerEvents = 'none';
                btn.style.opacity = '0.5';
            }
        }
    </script>

    <!--
    ## Interactions Defined
    | Element | Action | Target |
    |---------|--------|--------|
    | Cancel | click | 02_lock_preview.html |
    | Checkbox items | click | JavaScript checkAll() |
    | Lock button | click | 02_lock_success.html (when enabled) |
    -->
</body>
</html>
