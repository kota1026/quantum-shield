                <div class="card-body">
                    <div class="form-group">
                        <label class="form-label">Key Name</label>
                        <input type="text" class="form-input" placeholder="Production API Key">

                    </div>
                    <div class="form-group">
                        <label class="form-label">Expiration</label>
                        <select class="form-select">
                            <option>Never expires</option>
                            <option>30 days</option>
                            <option>90 days</option>
                            <option>1 year</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Permissions</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item">
                                <input type="checkbox" checked>
                                <div class="checkbox-label"><div>Read</div><div class="checkbox-desc">View transactions and analytics</div></div>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" checked>
                                <div class="checkbox-label"><div>Write</div><div class="checkbox-desc">Execute lock/unlock operations</div></div>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox">

                            </label>
                        </div>
                    </div>
