<!--
## Interactions Defined
| Element | Action | Target |
|---------|--------|--------|
| Auto redirect | onComplete | 10_lock_success.html |

## CDO-1: ローディングアニメーション統一
処理画面の統一仕様:
- 総処理時間: 5000ms (5秒)
- step間隔: 均等配分
- アニメーションCSS: 共通定義使用
-->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Shield - 処理中</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0c;
            --accent-hinomaru: #bc002d;
            --accent-hinomaru-light: #e8334d;
            --accent-hinomaru-dim: rgba(188, 0, 45, 0.12);
            --accent-hinomaru-glow: rgba(188, 0, 45, 0.4);
            --accent-gold: #c9a962;
            --success: #00c896;
            --text-primary: #f8f8fa;
            --text-secondary: #9898a0;
            --text-tertiary: #606068;
            --border-subtle: rgba(255, 255, 255, 0.04);
            --font-body: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
            --font-mono: 'DM Mono', monospace;
            --radius-lg: 14px;
            --radius-full: 9999px;
            /* CDO-1: アニメーション統一定義 */
            --animation-duration-orbit: 1.5s;
            --animation-duration-orbit-reverse: 2s;
            --animation-duration-pulse: 2s;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body); background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .premium-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .red-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 600px; background: radial-gradient(circle, var(--accent-hinomaru-dim), transparent 60%); opacity: 0.5; }
        .container { position: relative; z-index: 1; text-align: center; padding: 24px; max-width: 400px; }
        .processing-visual { margin-bottom: 32px; position: relative; width: 160px; height: 160px; margin: 0 auto 32px; }
        .hinomaru-core { position: absolute; inset: 30px; }
        .hinomaru-white { position: absolute; inset: 0; background: radial-gradient(circle at 40% 40%, rgba(255,255,255,0.15), rgba(255,255,255,0.02)); border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); }
        .hinomaru-red { position: absolute; inset: 20px; background: radial-gradient(circle at 35% 35%, #ff3050, var(--accent-hinomaru), #8a001a); border-radius: 50%; box-shadow: 0 0 40px var(--accent-hinomaru-glow); animation: pulse var(--animation-duration-pulse) ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
        .orbit { position: absolute; inset: 0; border: 2px solid transparent; border-top-color: var(--accent-gold); border-radius: 50%; animation: spin var(--animation-duration-orbit) linear infinite; }
        .orbit-2 { inset: -10px; border-top-color: var(--accent-hinomaru); animation-duration: var(--animation-duration-orbit-reverse); animation-direction: reverse; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .title { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
        .subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 32px; }
        .steps { text-align: left; margin-bottom: 32px; }
        .step { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: rgba(255,255,255,0.02); border-radius: var(--radius-lg); margin-bottom: 8px; transition: all 0.3s; }
        .step.active { background: var(--accent-hinomaru-dim); }
        .step.complete { background: rgba(0, 200, 150, 0.1); }
        .step-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 14px; }
        .step.pending .step-icon { background: rgba(255,255,255,0.05); color: var(--text-tertiary); }
        .step.active .step-icon { background: var(--accent-hinomaru); color: white; animation: step-pulse 1s ease-in-out infinite; }
        .step.complete .step-icon { background: var(--success); color: white; }
        @keyframes step-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .step-text { flex: 1; font-size: 14px; }
        .step.pending .step-text { color: var(--text-tertiary); }
        .step.active .step-text { color: var(--text-primary); font-weight: 500; }
        .step.complete .step-text { color: var(--success); }
        .tx-hash { font-family: var(--font-mono); font-size: 12px; color: var(--text-tertiary); margin-top: 16px; }
        .tx-hash a { color: var(--accent-gold); text-decoration: none; }
        .tx-hash a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="premium-bg"><div class="red-glow"></div></div>
    <div class="container">
        <div class="processing-visual">
            <div class="orbit"></div>
            <div class="orbit orbit-2"></div>
            <div class="hinomaru-core">
                <div class="hinomaru-white"></div>
                <div class="hinomaru-red"></div>
            </div>
        </div>
        <h1 class="title">Lock処理中...</h1>
        <p class="subtitle">しばらくお待ちください。このページを閉じないでください。</p>
        <div class="steps">
            <div class="step complete" id="step1">
                <div class="step-icon">✓</div>
                <span class="step-text">Dilithium署名を生成</span>
            </div>
            <div class="step complete" id="step2">
                <div class="step-icon">✓</div>
                <span class="step-text">トランザクションを作成</span>
            </div>
            <div class="step active" id="step3">
                <div class="step-icon">3</div>
                <span class="step-text">ブロックチェーンに送信中...</span>
            </div>
            <div class="step pending" id="step4">
                <div class="step-icon">4</div>
                <span class="step-text">確認を待機</span>
            </div>
        </div>
        <div class="tx-hash" id="txHash" style="display: none;">TX: <a href="https://sepolia.etherscan.io/tx/0x..." target="_blank" id="txLink">0x7a3f...9c2d</a></div>
    </div>
    <script>
        // CDO-1: 処理画面タイミング統一
        // 総処理時間: 5000ms
        // step間隔: 均等配分 (1250ms each for 4 steps remaining)
        const TOTAL_DURATION = 5000;
        const STEP_INTERVAL = 1250;

        // step3完了: 1250ms後
        setTimeout(() => {
            document.getElementById('step3').classList.remove('active');
            document.getElementById('step3').classList.add('complete');
            document.getElementById('step3').querySelector('.step-icon').textContent = '✓';
            document.getElementById('step4').classList.remove('pending');
            document.getElementById('step4').classList.add('active');
            document.getElementById('txHash').style.display = 'block';
        }, STEP_INTERVAL);

        // step4完了: 2500ms後 (1250ms * 2)
        setTimeout(() => {
            document.getElementById('step4').classList.remove('active');
            document.getElementById('step4').classList.add('complete');
            document.getElementById('step4').querySelector('.step-icon').textContent = '✓';
        }, STEP_INTERVAL * 2);

        // リダイレクト: 5000ms後
        setTimeout(() => {
            window.location.href = '10_lock_success.html';
        }, TOTAL_DURATION);
    </script>
</body>
</html>
