<!--
## Interactions Defined
| Element | Action | Target |
|---------|--------|--------|
| #viewDashboard | click | 03_dashboard.html |
| #viewHistory | click | 05_history.html |
| .tx-link | click | https://sepolia.etherscan.io/tx/... (external) |
-->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Shield - 緊急Unlock開始</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0c;
            --bg-secondary: #111114;
            --bg-card: #0e0e11;
            --accent-hinomaru: #bc002d;
            --accent-hinomaru-light: #e8334d;
            --accent-hinomaru-dim: rgba(188, 0, 45, 0.12);
            --accent-gold: #c9a962;
            --warning: #f0a030;
            --warning-dim: rgba(240, 160, 48, 0.12);
            --success: #00c896;
            --success-dim: rgba(0, 200, 150, 0.12);
            --text-primary: #f8f8fa;
            --text-secondary: #9898a0;
            --text-tertiary: #606068;
            --border-subtle: rgba(255, 255, 255, 0.04);
            --border-default: rgba(255, 255, 255, 0.08);
            --font-body: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
            --font-mono: 'DM Mono', monospace;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 20px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body); background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .premium-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .warning-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 600px; background: radial-gradient(circle, var(--warning-dim), transparent 60%); }
        .container { position: relative; z-index: 1; text-align: center; padding: 24px; max-width: 440px; width: 100%; }

        .success-icon { width: 100px; height: 100px; margin: 0 auto 24px; background: var(--warning-dim); border: 2px solid var(--warning); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 48px; animation: pop 0.5s ease-out; }
        @keyframes pop { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        .title { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: var(--warning); }
        .subtitle { font-size: 15px; color: var(--text-secondary); margin-bottom: 32px; }

        .timelock-card { background: var(--warning-dim); border: 1px solid var(--warning); border-radius: var(--radius-xl); padding: 24px; margin-bottom: 24px; }
        .timelock-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .timelock-icon { font-size: 32px; }
        .timelock-title { font-size: 16px; font-weight: 600; color: var(--warning); }
        .timelock-countdown { font-size: 32px; font-weight: 700; font-family: var(--font-mono); margin-bottom: 8px; }
        .timelock-label { font-size: 13px; color: var(--text-secondary); }
        .progress-bar { height: 6px; background: rgba(0,0,0,0.3); border-radius: 3px; overflow: hidden; margin-top: 16px; }
        .progress-fill { height: 100%; width: 0%; background: var(--warning); border-radius: 3px; }

        .result-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); padding: 24px; margin-bottom: 24px; text-align: left; }
        .result-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-subtle); }
        .result-row:last-child { border-bottom: none; }
        .result-label { font-size: 13px; color: var(--text-tertiary); }
        .result-value { font-size: 14px; font-weight: 500; }
        .result-value.highlight { color: var(--warning); font-size: 18px; }
        .result-value a { color: var(--accent-gold); text-decoration: none; font-family: var(--font-mono); font-size: 12px; }
        .result-value a:hover { text-decoration: underline; }

        .info-box { display: flex; align-items: flex-start; gap: 12px; padding: 16px; background: var(--success-dim); border: 1px solid var(--success); border-radius: var(--radius-lg); margin-bottom: 24px; text-align: left; }
        .info-icon { font-size: 20px; flex-shrink: 0; }
        .info-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

        .buttons { display: flex; gap: 12px; }
        .btn { flex: 1; padding: 16px; border-radius: var(--radius-lg); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; text-align: center; display: block; }
        .btn-primary { background: linear-gradient(135deg, var(--accent-hinomaru), var(--accent-hinomaru-light)); border: none; color: white; }
        .btn-primary:hover { box-shadow: 0 8px 24px var(--accent-hinomaru-dim); transform: translateY(-2px); }
        .btn-secondary { background: var(--bg-secondary); border: 1px solid var(--border-default); color: var(--text-secondary); }
        .btn-secondary:hover { border-color: var(--accent-gold); color: var(--accent-gold); }
    </style>
</head>
<body>
    <div class="premium-bg"><div class="warning-glow"></div></div>

    <div class="container">
        <div class="success-icon">⚠️</div>
        
        <h1 class="title">緊急Unlock開始</h1>
        <p class="subtitle">7日後にUnlockを実行できます</p>

        <div class="timelock-card">
            <div class="timelock-header">
                <span class="timelock-icon">⏰</span>
                <span class="timelock-title">緊急Time Lock残り時間</span>
            </div>
            <div class="timelock-countdown" id="countdown">6d 23:59:59</div>
            <div class="timelock-label">Challenge期間終了まで</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="result-card">
            <div class="result-row">
                <span class="result-label">Unlock金額</span>
                <span class="result-value highlight">10.00 ETH</span>
            </div>
            <div class="result-row">
                <span class="result-label">Bond（保証金）</span>
                <span class="result-value">0.50 ETH（返還予定）</span>
            </div>
            <div class="result-row">
                <span class="result-label">Unlock可能日時</span>
                <span class="result-value">2026-01-14 14:35:00</span>
            </div>
            <div class="result-row">
                <span class="result-label">TX Hash</span>
                <span class="result-value">
                    <a href="https://sepolia.etherscan.io/tx/0x9c5h2e4f..." target="_blank" class="tx-link">0x9c5h...2e4f ↗</a>
                </span>
            </div>
        </div>

        <div class="info-box">
            <span class="info-icon">💡</span>
            <span class="info-text">7日間のChallenge期間中に問題がなければ、Bondは自動的に返還されます。Unlock可能になったらダッシュボードから実行できます。</span>
        </div>

        <div class="buttons">
            <a href="03_dashboard.html" class="btn btn-primary" id="viewDashboard">ダッシュボードへ</a>
            <a href="05_history.html" class="btn btn-secondary" id="viewHistory">履歴を見る</a>
        </div>
    </div>

    <script>
        // 7 days countdown
        let totalSeconds = 6 * 24 * 3600 + 23 * 3600 + 59 * 60 + 59;
        const totalDuration = 7 * 24 * 3600;
        
        function updateCountdown() {
            const days = Math.floor(totalSeconds / (24 * 3600));
            const hours = Math.floor((totalSeconds % (24 * 3600)) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            
            document.getElementById('countdown').textContent = 
                days + 'd ' +
                String(hours).padStart(2, '0') + ':' + 
                String(minutes).padStart(2, '0') + ':' + 
                String(seconds).padStart(2, '0');
            
            const progress = ((totalDuration - totalSeconds) / totalDuration) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            if (totalSeconds > 0) totalSeconds--;
        }
        
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
