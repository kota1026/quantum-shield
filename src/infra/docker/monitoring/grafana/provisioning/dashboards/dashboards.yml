# =============================================================================
# Grafana Dashboard Provisioning Configuration
# =============================================================================

apiVersion: 1

providers:
  - name: 'Quantum Shield Dashboards'
    orgId: 1
    folder: 'Quantum Shield'
    folderUid: 'quantum-shield'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
