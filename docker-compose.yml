# Quantum Shield Development Stack
# Usage: docker-compose up -d

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: qs-postgres
    environment:
      POSTGRES_USER: quantum
      POSTGRES_PASSWORD: quantum_dev
      POSTGRES_DB: quantum_shield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantum -d quantum_shield"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: qs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3-management
    platform: linux/arm64
    container_name: qs-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: quantum
      RABBITMQ_DEFAULT_PASS: quantum_dev
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # L3 Local Node (Anvil - Foundry)
  # Simulates the L3 Aegis chain for local development
  l3-node:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: qs-l3-node
    entrypoint: ["anvil"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8545"
      - "--chain-id"
      - "31337"
      - "--block-time"
      - "2"
      - "--accounts"
      - "10"
      - "--balance"
      - "10000"
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "chain-id", "--rpc-url", "http://localhost:8545"]
      interval: 5s
      timeout: 5s
      retries: 10

  # MinIO Object Storage (S3-compatible) for document uploads
  minio:
    image: minio/minio:latest
    container_name: qs-minio
    environment:
      MINIO_ROOT_USER: quantum
      MINIO_ROOT_PASSWORD: quantum_dev_storage
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO bucket initialization (creates qs-documents bucket on first run)
  minio-init:
    image: minio/mc:latest
    container_name: qs-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 quantum quantum_dev_storage;
      mc mb --ignore-existing local/qs-documents;
      echo 'Bucket qs-documents created';
      "

  # L1 Local Node (Anvil - Foundry) - Optional for full local testing
  # Simulates Sepolia for local development
  l1-node:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: qs-l1-node
    entrypoint: ["anvil"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8546"
      - "--chain-id"
      - "11155111"
      - "--block-time"
      - "12"
      - "--accounts"
      - "10"
      - "--balance"
      - "10000"
    ports:
      - "8546:8546"
    profiles:
      - full  # Only start with: docker-compose --profile full up
    healthcheck:
      test: ["CMD", "cast", "chain-id", "--rpc-url", "http://localhost:8546"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:

networks:
  default:
    name: quantum-shield-network
