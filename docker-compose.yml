# Quantum Shield Development Stack
# Usage: docker-compose up -d

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: qs-postgres
    environment:
      POSTGRES_USER: quantum
      POSTGRES_PASSWORD: quantum_dev
      POSTGRES_DB: quantum_shield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantum -d quantum_shield"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: qs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: qs-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: quantum
      RABBITMQ_DEFAULT_PASS: quantum_dev
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # L3 Local Node (Anvil - Foundry)
  # Simulates the L3 Aegis chain for local development
  l3-node:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: qs-l3-node
    entrypoint: ["anvil"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8545"
      - "--chain-id"
      - "31337"
      - "--block-time"
      - "2"
      - "--accounts"
      - "10"
      - "--balance"
      - "10000"
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "chain-id", "--rpc-url", "http://localhost:8545"]
      interval: 5s
      timeout: 5s
      retries: 10

  # L1 Local Node (Anvil - Foundry) - Optional for full local testing
  # Simulates Sepolia for local development
  l1-node:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: qs-l1-node
    entrypoint: ["anvil"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8546"
      - "--chain-id"
      - "11155111"
      - "--block-time"
      - "12"
      - "--accounts"
      - "10"
      - "--balance"
      - "10000"
    ports:
      - "8546:8546"
    profiles:
      - full  # Only start with: docker-compose --profile full up
    healthcheck:
      test: ["CMD", "cast", "chain-id", "--rpc-url", "http://localhost:8546"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  default:
    name: quantum-shield-network
