name: Daily PQC Research

# Daily autonomous intelligence loop (Layer 1 of the autonomous improvement system).
# - Runs every day at 00:00 UTC (09:00 JST)
# - Uses Claude Haiku 4.5 for cost efficiency
# - Writes report to docs/intelligence/daily/YYYY-MM-DD.md
# - When Claude scores significance >= 7, opens a GitHub Issue with label `research`
# - When score >= 9, also adds label `pivot-alert` for founder review

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_issue:
        description: 'Force issue creation regardless of significance score'
        required: false
        default: 'false'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  research:
    name: Daily PQC Intelligence Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run daily research
        id: research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FORCE_ISSUE: ${{ github.event.inputs.force_issue }}
        run: node scripts/run-daily-research.js

      - name: Commit daily report and open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          REPORT="docs/intelligence/daily/${DATE}.md"
          if [ ! -f "$REPORT" ]; then
            echo "No report generated (likely API failure or skip)"
            exit 0
          fi
          BRANCH="research/daily-${DATE}"
          git config user.name "Claude Research Bot"
          git config user.email "research@quantum-shield.xyz"
          git checkout -b "$BRANCH"
          git add docs/intelligence/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "research: daily PQC intel ${DATE}"
          # Retry push up to 4 times with exponential backoff for transient errors
          for attempt in 1 2 3 4; do
            if git push -u origin "$BRANCH"; then
              break
            fi
            sleep $((2 ** attempt))
          done
          # Open or refresh a daily-intel PR (skip if one already exists for this branch)
          if ! gh pr view "$BRANCH" >/dev/null 2>&1; then
            gh pr create \
              --title "Daily PQC Intel - ${DATE}" \
              --body "Auto-generated by daily-research.yml. Docs-only change; safe to merge after a quick scan of the report." \
              --base main \
              --head "$BRANCH" \
              --label "auto-generated,daily-intel"
          fi

      - name: Create issue if significant
        if: steps.research.outputs.significance_score >= '7'
        env:
          GH_TOKEN: ${{ github.token }}
          SCORE: ${{ steps.research.outputs.significance_score }}
          TITLE: ${{ steps.research.outputs.issue_title }}
          BODY_FILE: ${{ steps.research.outputs.issue_body_file }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          LABELS="research,auto-generated"
          if [ "${SCORE}" -ge 9 ]; then
            LABELS="${LABELS},pivot-alert,priority-high"
          elif [ "${SCORE}" -ge 8 ]; then
            LABELS="${LABELS},priority-high"
          fi
          gh issue create \
            --title "[Daily Intel ${DATE}] ${TITLE}" \
            --body-file "${BODY_FILE}" \
            --label "${LABELS}"
