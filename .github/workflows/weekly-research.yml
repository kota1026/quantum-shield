name: Weekly PQC Research

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  research:
    name: PQC Industry Research
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run PQC research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/run-research.js

      - name: Commit and create PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "Claude Research Bot"
          git config user.email "research@quantum-shield.xyz"
          DATE=$(date +%Y-%m-%d)
          BRANCH="research/weekly-${DATE}"
          if [ -f "docs/intelligence/${DATE}-weekly.md" ]; then
            git checkout -b "$BRANCH"
            git add docs/intelligence/
            git commit -m "research: weekly PQC intelligence report ${DATE}"
            git push origin "$BRANCH"
            gh pr create \
              --title "Weekly PQC Intelligence - ${DATE}" \
              --body "Auto-generated weekly research report." \
              --base main \
              --head "$BRANCH"
          fi
        
