name: L3-Aegis CI

on:
  push:
    branches:
      - main
      - dev/phase2-native-stark
      - release/*
    paths:
      - src/l3/**
      - .github/workflows/l3-aegis.yml
  pull_request:
    branches:
      - main
    paths:
      - src/l3/**
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FOUNDRY_PROFILE: default

jobs:
  solidity-tests:
    name: L3-Aegis Solidity Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/l3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Install Dependencies
        run: forge install
        continue-on-error: true
      - name: Build Contracts
        run: forge build --force
      - name: Run Tests
        run: forge test -vv
        continue-on-error: true
      - name: Gas Report
        run: forge test --gas-report
        continue-on-error: true

  rust-tests:
    name: L3-Aegis Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/l3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build
        continue-on-error: true
      - name: Run Tests
        run: cargo test
        continue-on-error: true

  cp1-compliance:
    name: CP-1 Compliance Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check for keccak256
        run: |
          echo "Checking for prohibited keccak256..."
          if grep -rq "keccak256" src/l3/src/ 2>/dev/null; then
            echo "ERROR: keccak256 found!"
            grep -rn "keccak256" src/l3/src/
            exit 1
          else
            echo "OK: No keccak256 found"
          fi
      - name: Check for ECDSA
        run: |
          echo "Checking for prohibited ECDSA..."
          if grep -rqiE "ecdsa|secp256k1|ecrecover" src/l3/src/ 2>/dev/null; then
            echo "ERROR: ECDSA found!"
            exit 1
          else
            echo "OK: No ECDSA found"
          fi

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/l3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Install Slither
        run: pip install slither-analyzer
      - name: Build
        run: forge build --force
        continue-on-error: true
      - name: Run Slither
        run: slither . --exclude-dependencies 2>&1 | head -100 || true
        continue-on-error: true

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - solidity-tests
      - rust-tests
      - cp1-compliance
      - static-analysis
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## L3-Aegis CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Solidity | ${{ needs.solidity-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust | ${{ needs.rust-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CP-1 | ${{ needs.cp1-compliance.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Slither | ${{ needs.static-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
