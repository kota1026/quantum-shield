name: UX Orchestrator

on:
  push:
    branches: [main]
    paths:
      - 'src/frontend/web/**'
      - 'src/agents/ux-orchestrator/**'
      - '.github/workflows/ux-orchestrator.yml'
  pull_request:
    paths:
      - 'src/frontend/web/**'
      - 'src/agents/ux-orchestrator/**'
  workflow_dispatch:
    inputs:
      route:
        description: 'Route id from src/frontend/web/e2e/visual-regression/routes.ts, or "all"'
        required: false
        default: 'home-ja'
        type: string
      auto_fix:
        description: 'Apply healer-proposed patches (i18n catalog / route registry / test code only)'
        required: false
        default: false
        type: boolean
  schedule:
    # Daily 21:23 UTC = 06:23 JST. Slightly offset from e2e to avoid concurrent quota.
    - cron: '23 21 * * *'

permissions:
  contents: write   # auto-commit run outputs to docs/orchestrator-runs/

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      QS_BASE_URL: ${{ secrets.QS_STAGING_URL || 'http://localhost:3000' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Skip if no API key
        if: env.ANTHROPIC_API_KEY == ''
        run: |
          echo "::warning::ANTHROPIC_API_KEY not set; UX orchestrator skipped."
          exit 0

      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            src/frontend/web/pnpm-lock.yaml
            src/agents/ux-orchestrator/pnpm-lock.yaml

      - name: Install Playwright browsers
        working-directory: src/frontend/web
        run: |
          pnpm install --frozen-lockfile
          npx playwright install --with-deps chromium

      - name: Start Next.js dev server
        working-directory: src/frontend/web
        run: |
          pnpm dev &
          echo "Waiting for Next.js on :3000..."
          for i in {1..60}; do
            curl -sf http://localhost:3000 > /dev/null && echo "frontend ready" && break
            sleep 2
          done
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

      - name: Install ux-orchestrator deps
        working-directory: src/agents/ux-orchestrator
        run: pnpm install --frozen-lockfile

      - name: Type-check ux-orchestrator
        working-directory: src/agents/ux-orchestrator
        run: pnpm lint

      - name: Run UX orchestrator
        id: orchestrator
        working-directory: src/agents/ux-orchestrator
        env:
          REPO_ROOT: ${{ github.workspace }}
        # Informational mode: UX verdicts (regression / broken / etc) are
        # reported to the PR comment + artifact + step summary, but do NOT
        # block the workflow. Visual + copy + a11y agents have known
        # variance in output; over-blocking during warm-up creates more
        # noise than signal. Flip to false once we have a stable baseline
        # corpus.
        continue-on-error: true
        run: |
          pnpm verify --route ${{ inputs.route || 'home-ja' }} \
            ${{ inputs.auto_fix && '--auto-fix' || '' }}

      - name: Summarize UX orchestrator verdict
        if: always()
        working-directory: src/agents/ux-orchestrator
        run: |
          echo "## UX Orchestrator verdict" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d reports ]; then
            latest=$(ls -1dt reports/*/ 2>/dev/null | head -1)
            if [ -n "$latest" ] && [ -f "$latest/report.json" ]; then
              echo '```json' >> $GITHUB_STEP_SUMMARY
              cat "$latest/report.json" >> $GITHUB_STEP_SUMMARY
              echo '' >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            else
              echo "_(orchestrator did not produce a report — see Run UX orchestrator step output)_" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "_(no reports/ directory — orchestrator likely crashed during setup; see Run UX orchestrator step)_" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload UX orchestrator report + patches
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ux-orchestrator-report
          path: |
            src/agents/ux-orchestrator/reports/
          retention-days: 14

      - name: Comment PR with verdict
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const reportsDir = 'src/agents/ux-orchestrator/reports';
            if (!fs.existsSync(reportsDir)) return;
            const dirs = fs.readdirSync(reportsDir).filter((d) => !d.startsWith('.'));
            for (const dir of dirs) {
              const archivePath = path.join(reportsDir, dir, 'archive.json');
              if (!fs.existsSync(archivePath)) continue;
              const archive = JSON.parse(fs.readFileSync(archivePath, 'utf8'));
              if (archive.pr_comment_md) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: archive.pr_comment_md,
                });
              }
            }

      - name: Commit run output to docs/orchestrator-runs/
        # Skip on pull_request — keep PR runs as artifact-only. Run on
        # push/schedule/dispatch where we have a stable target branch.
        if: always() && github.event_name != 'pull_request'
        run: |
          set -e
          DEST="docs/orchestrator-runs/ux/${{ github.run_id }}"
          mkdir -p "$DEST"
          if [ -d src/agents/ux-orchestrator/reports ]; then
            cp -r src/agents/ux-orchestrator/reports/. "$DEST/" 2>/dev/null || true
          fi
          cat > "$DEST/run-info.json" <<EOF
          {
            "run_id": "${{ github.run_id }}",
            "workflow": "ux-orchestrator",
            "route": "${{ inputs.route || 'home-ja' }}",
            "sha": "${{ github.sha }}",
            "trigger": "${{ github.event_name }}",
            "actor": "${{ github.actor }}",
            "started_at": "$(date -u -Iseconds)"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/orchestrator-runs/
          git diff --cached --quiet || git commit -m "ci(ux-orchestrator): run ${{ github.run_id }} [skip ci]"
          git pull --rebase origin main 2>/dev/null || true
          git push origin HEAD:main || echo "::warning::could not push run output (likely branch protection); artifact still available"
