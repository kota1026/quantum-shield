name: Claude Code Updates Watch

# 2026-05-08: nudge re-index — first merge appeared 404 in GitHub UI,
# same workaround as commit bf27cb88 for phase1-manual-verify.

on:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday 00:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  watch:
    name: Detect new Claude Code releases
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Fetch recent releases from GitHub
        id: fetch
        run: |
          set -euo pipefail
          mkdir -p /tmp/claude-updates
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/anthropics/claude-code/releases?per_page=10" \
            > /tmp/claude-updates/releases.json

          # Filter releases published in the last 8 days (catches one full week + small buffer).
          jq -r --arg since "$(date -u -d '8 days ago' +%Y-%m-%dT%H:%M:%SZ)" '
            [.[] | select(.published_at >= $since)] as $recent |
            if ($recent | length) == 0 then
              "NONE"
            else
              ($recent | map("- **\(.tag_name)** (\(.published_at | split("T")[0]))\n\n\(.body // "_No release notes._")\n") | join("\n---\n\n"))
            end
          ' /tmp/claude-updates/releases.json > /tmp/claude-updates/digest.md

          if [ "$(cat /tmp/claude-updates/digest.md)" = "NONE" ]; then
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_new=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open digest issue
        if: steps.fetch.outputs.has_new == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          TITLE="[claude-updates] Weekly digest ${DATE}"

          # De-dupe: skip if an open issue with the same title already exists.
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --state open --search "in:title \"${TITLE}\"" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Issue #${EXISTING} already open — skipping."
            exit 0
          fi

          {
            echo "Auto-generated weekly digest of Claude Code releases."
            echo ""
            echo "## What to do next"
            echo ""
            echo "1. Review the release notes below."
            echo "2. In a local clone, run \`/claude-updates\` to evaluate fit."
            echo "3. The \`claude-updates-curator\` agent will draft a PR."
            echo ""
            echo "## Recent releases"
            echo ""
            cat /tmp/claude-updates/digest.md
          } > /tmp/claude-updates/issue-body.md

          # Ensure the label exists (idempotent).
          gh label create claude-updates --repo "${{ github.repository }}" --color "0E8A16" --description "Claude Code release tracking" 2>/dev/null || true

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "${TITLE}" \
            --body-file /tmp/claude-updates/issue-body.md \
            --label claude-updates
