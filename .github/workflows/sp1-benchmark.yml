name: SP1 Dilithium Benchmark

on:
  push:
    branches:
      - main
      - master
      - 'phase*'
  workflow_dispatch:

jobs:
  sp1-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev build-essential

      - name: Clear conflicting environment variables
        run: |
          # 競合するRUSTUPツールチェーン設定を削除
          unset RUSTUP_TOOLCHAIN
          # GitHub Actions環境でRUSTUP_TOOLCHAINを無効化
          echo "RUSTUP_TOOLCHAIN=" >> $GITHUB_ENV

      - name: Setup Nightly Rust toolchain and SP1 Target
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
          components: llvm-tools
          target: riscv32im-succinct-zkvm

      - name: Install SP1 Prover tools (Required for build)
        run: curl -L https://sp1up.succinct.xyz | bash

      - name: Build and Run Benchmark
        run: cd sp1-bench/script && cargo run --release 2>&1 | tee benchmark-output.txt
        env:
          PATH: ${{ env.HOME }}/.sp1/bin:${{ env.PATH }}

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: sp1-bench/script/benchmark-output.txt
          retention-days: 30

      - name: Display benchmark summary
        if: always()
        run: |
          echo "=== Benchmark Results ==="
          cat sp1-bench/script/benchmark-output.txt || echo "No output file found"
