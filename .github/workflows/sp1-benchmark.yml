name: SP1 Dilithium Benchmark

on:
  push:
    branches:
      - main
      - master
      - 'phase*'
  workflow_dispatch:

jobs:
  sp1-benchmark:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/succinctlabs/sp1:latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        run: |
          echo "=== Environment diagnostics ==="
          echo "PATH: $PATH"
          which cargo || echo "cargo not found"
          which rustc || echo "rustc not found"
          which rustup || echo "rustup not found"
          # Install stable toolchain and set as default
          rustup install stable || true
          rustup default stable

      - name: Install dependencies
        run: |
          # Install wget and curl if not present
          apt-get update && apt-get install -y curl wget || true

      - name: Install SP1 toolchain
        run: |
          # Install SP1
          curl -L https://sp1up.succinct.xyz | bash
          export PATH="$HOME/.sp1/bin:$PATH"
          sp1up
          echo "$HOME/.sp1/bin" >> $GITHUB_PATH

      - name: Build and Run Benchmark
        run: |
          export PATH="$HOME/.sp1/bin:$PATH"
          cd sp1-bench/script && cargo run --release 2>&1 | tee benchmark-output.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: sp1-bench/script/benchmark-output.txt
          retention-days: 30

      - name: Display benchmark summary
        if: always()
        run: |
          echo "=== Benchmark Results ==="
          cat sp1-bench/script/benchmark-output.txt || echo "No output file found"
