name: SP1 Dilithium Benchmark

on:
  push:
    branches:
      - main
      - master
      - 'phase*'
  workflow_dispatch:

jobs:
  sp1-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev build-essential

      - name: Set up SP1 Build Environment (Final Attempt)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly-2024-05-01
          override: true
          components: rust-src, llvm-tools
          target: riscv32im-succinct-zkvm

      - name: Build and Run Benchmark
        run: cd sp1-bench/script && cargo run --release 2>&1 | tee benchmark-output.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: sp1-bench/script/benchmark-output.txt
          retention-days: 30

      - name: Display benchmark summary
        if: always()
        run: |
          echo "=== Benchmark Results ==="
          cat sp1-bench/script/benchmark-output.txt || echo "No output file found"
