name: SP1 Dilithium Benchmark

on:
  push:
    branches:
      - main
      - master
      - phase4c-sphincs-analysis
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  SP1_PROVER: local

jobs:
  benchmark:
    name: SP1 Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev build-essential

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install SP1 Toolchain and Components (Official Method)
        run: |
          # 1. SP1公式インストールを実行。これにより、必要なNightlyとLLVMがインストールされる
          curl -L https://sp1up.succinct.xyz | bash

          # 2. SP1のbinディレクトリを現在のセッションの$PATHに永続的に追加
          echo "$HOME/.sp1/bin" >> $GITHUB_PATH

          # 3. RISC-Vターゲットをインストール
          rustup target add riscv32im-succinct-zkvm

          # 4. 依存するLLVMコンポーネントを確実に追加
          rustup component add llvm-tools --toolchain nightly

      - name: Build and Run Benchmark
        run: cd sp1-bench/script && cargo run --release 2>&1 | tee benchmark-output.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: sp1-bench/script/benchmark-output.txt
          retention-days: 30

      - name: Display benchmark summary
        run: |
          echo "=== Benchmark Results ==="
          cat sp1-bench/script/benchmark-output.txt || echo "No output file found"
