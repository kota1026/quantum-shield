name: SP1 Dilithium Benchmark

on:
  push:
    branches:
      - main
      - master
      - 'phase*'
  workflow_dispatch:

jobs:
  sp1-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev build-essential

      - name: Setup Nightly Rust Toolchain (Standard Method)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools

      - name: Install SP1 Toolchain and Dependencies
        run: |
          # 1. SP1公式インストールを実行 (nightly環境へ)
          curl -L https://sp1up.succinct.xyz | bash

          # 2. SP1のbinディレクトリを$PATHに明示的に追加
          echo "$HOME/.sp1/bin" >> $GITHUB_PATH

      - name: Install RISC-V Target (Final Check)
        run: rustup target add riscv32im-succinct-zkvm || true

      - name: Build and Run Benchmark
        run: cd sp1-bench/script && cargo run --release 2>&1 | tee benchmark-output.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: sp1-bench/script/benchmark-output.txt
          retention-days: 30

      - name: Display benchmark summary
        if: always()
        run: |
          echo "=== Benchmark Results ==="
          cat sp1-bench/script/benchmark-output.txt || echo "No output file found"
