name: SP1 Dilithium Benchmark

on:
  push:
    branches:
      - main
      - master
      - 'phase*'
  workflow_dispatch:

jobs:
  sp1-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install SP1 toolchain
        run: |
          # Install SP1
          curl -L https://sp1up.succinct.xyz | bash
          source ~/.bashrc || true
          ~/.sp1/bin/sp1up
          echo "$HOME/.sp1/bin" >> $GITHUB_PATH

      - name: Verify SP1 installation
        run: |
          export PATH="$HOME/.sp1/bin:$PATH"
          cargo prove --version || echo "cargo prove not found"

      - name: Build and Run Benchmark
        run: |
          export PATH="$HOME/.sp1/bin:$PATH"
          cd sp1-bench/script && cargo run --release 2>&1 | tee benchmark-output.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: sp1-bench/script/benchmark-output.txt
          retention-days: 30

      - name: Display benchmark summary
        if: always()
        run: |
          echo "=== Benchmark Results ==="
          cat sp1-bench/script/benchmark-output.txt || echo "No output file found"
