name: SP1 Dilithium Benchmark

on:
  push:
    branches:
      - main
      - master
      - 'phase*'
  workflow_dispatch:

jobs:
  sp1-benchmark:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/succinctlabs/sp1:latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SP1 environment
        run: |
          # Add SP1 bin to PATH if present
          if [ -d "$HOME/.sp1/bin" ]; then
            echo "$HOME/.sp1/bin" >> $GITHUB_PATH
          fi
          # Show available toolchains
          echo "=== Available Rust toolchains ==="
          rustup toolchain list
          echo "=== RUSTUP_TOOLCHAIN ==="
          echo "Current: ${RUSTUP_TOOLCHAIN:-not set}"

      - name: Build and Run Benchmark in Docker
        run: cd sp1-bench/script && cargo run --release 2>&1 | tee benchmark-output.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: sp1-bench/script/benchmark-output.txt
          retention-days: 30

      - name: Display benchmark summary
        if: always()
        run: |
          echo "=== Benchmark Results ==="
          cat sp1-bench/script/benchmark-output.txt || echo "No output file found"
