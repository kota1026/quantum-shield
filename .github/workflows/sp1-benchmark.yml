name: SP1 Dilithium Benchmark

on:
  push:
    branches:
      - main
      - master
      - 'phase*'
  workflow_dispatch:

jobs:
  sp1-benchmark:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/succinctlabs/sp1:latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clear conflicting environment variables
        run: |
          # RUSTUP_TOOLCHAINが設定されている場合、それをunsetで削除
          unset RUSTUP_TOOLCHAIN
          # $HOME/.sp1/bin にパスが通っているか確認し、通っていなければ通す
          if [ -d "$HOME/.sp1/bin" ]; then
            echo "$HOME/.sp1/bin" >> $GITHUB_PATH
          fi

      - name: Build and Run Benchmark in Docker
        run: cd sp1-bench/script && cargo run --release 2>&1 | tee benchmark-output.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: sp1-bench/script/benchmark-output.txt
          retention-days: 30

      - name: Display benchmark summary
        if: always()
        run: |
          echo "=== Benchmark Results ==="
          cat sp1-bench/script/benchmark-output.txt || echo "No output file found"
