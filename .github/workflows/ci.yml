name: Quantum Shield CI

on:
  push:
    branches: [main, dev/*, release/*]
    paths:
      - 'circuits/**'
      - 'contracts/**'
      - 'proofs/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [main]
  workflow_dispatch:
env:
  CARGO_TERM_COLOR: always
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  # ========================================
  # Rust Tests (Critical)
  # ========================================
  rust-tests:
    name: 🦀 Rust Tests
    runs-on: ubuntu-latest
    outputs:
      test_result: ${{ steps.test.outputs.result }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build pq-crystals FFI
        run: |
          cd circuits/dilithium-stark
          cargo build --features pq_crystals_ffi
      
      - name: Run NIST KAT Tests (CRITICAL)
        id: kat
        run: |
          cd circuits/dilithium-stark
          cargo test test_nist_kat_ffi -- --nocapture 2>&1 | tee kat_output.txt
          if grep -q "Signatures verified: 100" kat_output.txt; then
            echo "kat_status=pass" >> $GITHUB_OUTPUT
          else
            echo "kat_status=fail" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      - name: Run All Tests
        id: test
        run: |
          cd circuits/dilithium-stark
          cargo test 2>&1 | tee test_output.txt
          echo "result=success" >> $GITHUB_OUTPUT
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-test-results
          path: circuits/dilithium-stark/*_output.txt

  # ========================================
  # Lean4 Formal Proofs
  # ========================================
  lean4-proofs:
    name: 📐 Lean4 Proofs
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup elan (Lean version manager)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      
      - name: Check for sorry
        run: |
          if grep -rq "sorry" proofs/lean4/*.lean 2>/dev/null; then
            echo "❌ ERROR: 'sorry' found in Lean4 proofs!"
            grep -rn "sorry" proofs/lean4/*.lean
            exit 1
          else
            echo "✅ No 'sorry' found"
          fi
      
      - name: Build Lean4 Proofs
        run: |
          cd proofs/lean4
          lake update
          lake build
        continue-on-error: true

  # ========================================
  # Solidity Tests
  # ========================================
  solidity-tests:
    name: 📜 Solidity Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
      
      - name: Build Contracts
        run: |
          cd contracts
          forge build --force
        continue-on-error: true
      
      - name: Run Tests
        run: |
          cd contracts
          forge test -vv
        continue-on-error: true

  # ========================================
  # Agent Verification
  # ========================================
  agent-verification:
    name: 🛡️ Agent Verification
    runs-on: ubuntu-latest
    needs: [rust-tests]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: rust-test-results
          path: test-results/
      
      - name: Run Agent Verification
        run: |
          python3 scripts/agent_verify.py || true
      
      - name: Upload Agent Report
        uses: actions/upload-artifact@v4
        with:
          name: agent-report
          path: agent_report.json
        continue-on-error: true

  # ========================================
  # Notification
  # ========================================
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [rust-tests, lean4-proofs, solidity-tests]
    if: always()
