name: Quantum Shield CI

on:
  push:
    branches: [main, dev/*, release/*]
    paths-ignore:
      - 'src/infra/scripts/**'
      - 'docs/**'
      - '*.md'
      - '.github/workflows/agent-worker.yml'
      - '.github/workflows/slack-bot.yml'
      - '.github/workflows/daily-standup.yml'
      - '.github/workflows/research-breakthrough.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
env:
  CARGO_TERM_COLOR: always
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  # ========================================
  # Rust Tests (Critical)
  # ========================================
  rust-tests:
    name: 🦀 Rust Tests
    runs-on: ubuntu-latest
    outputs:
      test_result: ${{ steps.test.outputs.result }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build pq-crystals FFI
        run: |
          cd src/crypto/circuits/dilithium-stark
          cargo build --features pq_crystals_ffi

      - name: Run NIST KAT Tests (CRITICAL)
        id: kat
        run: |
          cd src/crypto/circuits/dilithium-stark
          cargo test test_nist_kat_ffi -- --nocapture 2>&1 | tee kat_output.txt
          if grep -q "Signatures verified: 100" kat_output.txt; then
            echo "kat_status=pass" >> $GITHUB_OUTPUT
          else
            echo "kat_status=fail" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Run All Tests
        id: test
        run: |
          cd src/crypto/circuits/dilithium-stark
          cargo test 2>&1 | tee test_output.txt
          echo "result=success" >> $GITHUB_OUTPUT

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-test-results
          path: src/crypto/circuits/dilithium-stark/*_output.txt

  # ========================================
  # API Server Tests (Critical)
  # ========================================
  api-tests:
    name: 🔧 API Server Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: quantum
          POSTGRES_PASSWORD: quantum_dev
          POSTGRES_DB: quantum_shield
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-api-${{ hashFiles('**/Cargo.lock') }}

      - name: Run migrations
        run: |
          cd src/api/api
          cargo install sqlx-cli --no-default-features --features postgres || true
          DATABASE_URL="postgresql://quantum:quantum_dev@localhost:5432/quantum_shield" sqlx migrate run

      - name: Build API Server
        run: |
          cd src/api/api
          SQLX_OFFLINE=true cargo build -p quantum-shield-api

      - name: Run API Tests
        run: |
          cd src/api/api
          SQLX_OFFLINE=true cargo test
        env:
          DATABASE_URL: "postgresql://quantum:quantum_dev@localhost:5432/quantum_shield"

  # ========================================
  # Lean4 Formal Proofs
  # ========================================
  lean4-proofs:
    name: 📐 Lean4 Proofs
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup elan (Lean version manager)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      
      - name: Check for sorry
        run: |
          if grep -rq "sorry" src/crypto/proofs/lean4/*.lean 2>/dev/null; then
            echo "❌ ERROR: 'sorry' found in Lean4 proofs!"
            grep -rn "sorry" src/crypto/proofs/lean4/*.lean
            exit 1
          else
            echo "✅ No 'sorry' found"
          fi

      - name: Build Lean4 Proofs
        run: |
          cd src/crypto/proofs/lean4
          lake update
          lake build

  # ========================================
  # Solidity Tests
  # ========================================
  solidity-tests:
    name: 📜 Solidity Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
      
      - name: Build Contracts
        run: |
          cd src/l1/contracts
          forge build --force

      - name: Run Tests
        run: |
          cd src/l1/contracts
          forge test -vv

  # ========================================
  # Frontend E2E Tests
  # ========================================
  e2e-tests:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: |
          cd src/frontend/web
          pnpm install

      - name: Install Playwright Browsers
        run: |
          cd src/frontend/web
          npx playwright install chromium --with-deps

      - name: Run API Integration Tests
        run: |
          cd src/frontend/web
          NO_SERVER=1 npx playwright test e2e/integration/ --project=chromium --reporter=list

      - name: Upload E2E Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/frontend/web/playwright-report/
          retention-days: 7

  # ========================================
  # Agent Verification
  # ========================================
  agent-verification:
    name: 🛡️ Agent Verification
    runs-on: ubuntu-latest
    needs: [rust-tests]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: rust-test-results
          path: test-results/
      
      - name: Run Agent Verification
        run: |
          python3 src/infra/scripts/agent_verify.py || true
      
      - name: Upload Agent Report
        uses: actions/upload-artifact@v4
        with:
          name: agent-report
          path: agent_report.json
        continue-on-error: true

  # ========================================
  # Notification
  # ========================================
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [rust-tests, api-tests, lean4-proofs, solidity-tests, e2e-tests]
    if: always()
