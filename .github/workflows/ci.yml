name: Quantum Shield CI

on:
  push:
    branches: [main, dev/*, release/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  rust-tests:
    name: 🦀 Rust Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Build and Test
        run: |
          cd circuits/dilithium-stark
          cargo build --features pq_crystals_ffi
          cargo test test_nist_kat_ffi -- --nocapture
          cargo test

  lean4-proofs:
    name: 📐 Lean4 Proofs
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for sorry
        run: |
          if grep -rq "sorry" proofs/lean4/*.lean 2>/dev/null; then
            echo "❌ Found sorry!"
            exit 1
          fi
          echo "✅ No sorry found"

  solidity-tests:
    name: 📜 Solidity Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - uses: foundry-rs/foundry-toolchain@v1
      
      - name: Test
        run: cd contracts && forge test -vv
        continue-on-error: true

  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [rust-tests, lean4-proofs, solidity-tests]
    if: always()
    
    steps:
      - name: Slack Notification
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d '{"text":"Quantum Shield CI: Rust=${{ needs.rust-tests.result }}, Lean4=${{ needs.lean4-proofs.result }}, Solidity=${{ needs.solidity-tests.result }}"}'
