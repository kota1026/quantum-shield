name: Weekly Agent Review

on:
  schedule:
    - cron: '0 20 * * 0'
  workflow_dispatch:

env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  collect_metrics:
    name: Collect Weekly Metrics
    runs-on: ubuntu-latest
    outputs:
      commits: ${{ steps.metrics.outputs.commits }}
      issues_closed: ${{ steps.metrics.outputs.issues_closed }}
      prs_merged: ${{ steps.metrics.outputs.prs_merged }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gather Metrics
        id: metrics
        run: |
          WEEK_AGO=$(date -d '7 days ago' '+%Y-%m-%d')
          COMMITS=$(git log --since="$WEEK_AGO" --oneline | wc -l)
          echo "commits=$COMMITS" >> $GITHUB_OUTPUT
          echo "issues_closed=0" >> $GITHUB_OUTPUT
          echo "prs_merged=0" >> $GITHUB_OUTPUT

  security_review:
    name: Security Review
    runs-on: ubuntu-latest
    outputs:
      vulnerabilities: ${{ steps.audit.outputs.vulns }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet || true
      - name: Run Audit
        id: audit
        run: |
          VULNS=$(cargo audit 2>&1 | grep -c "Vulnerability" || echo "0")
          echo "vulns=$VULNS" >> $GITHUB_OUTPUT
        continue-on-error: true

  code_quality:
    name: Code Quality Review
    runs-on: ubuntu-latest
    outputs:
      todos: ${{ steps.quality.outputs.todos }}
      test_coverage: ${{ steps.quality.outputs.coverage }}
    steps:
      - uses: actions/checkout@v4
      - name: Count TODOs
        id: quality
        run: |
          TODOS=$(grep -rn 'TODO\|FIXME\|HACK' --include='*.rs' --include='*.sol' . 2>/dev/null | wc -l || echo "0")
          echo "todos=$TODOS" >> $GITHUB_OUTPUT
          echo "coverage=N/A" >> $GITHUB_OUTPUT

  generate_weekly_report:
    name: Generate Weekly Report
    runs-on: ubuntu-latest
    needs: [collect_metrics, security_review, code_quality]
    steps:
      - uses: actions/checkout@v4

      - name: Create Weekly Report Issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const body = `# Weekly Agent Review - ${date}

            ## Metrics
            - Commits this week: ${{ needs.collect_metrics.outputs.commits }}
            - Issues closed: ${{ needs.collect_metrics.outputs.issues_closed }}
            - PRs merged: ${{ needs.collect_metrics.outputs.prs_merged }}

            ## Security
            - Vulnerabilities found: ${{ needs.security_review.outputs.vulnerabilities }}

            ## Code Quality
            - TODO/FIXME count: ${{ needs.code_quality.outputs.todos }}
            - Test coverage: ${{ needs.code_quality.outputs.test_coverage }}

            ## Recommendations
            - [ ] Review and address any security vulnerabilities
            - [ ] Reduce TODO count if above 50
            - [ ] Update documentation

            ---
            @kota1026 Please review this weekly summary.
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Weekly Review - ' + date,
              body: body,
              labels: ['weekly-review', 'automated'],
              assignees: ['kota1026']
            });

      - name: Slack Notification
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" -H 'Content-type: application/json' \
            -d "{\"text\":\"Weekly Review Ready\nCommits: ${{ needs.collect_metrics.outputs.commits }}\nVulns: ${{ needs.security_review.outputs.vulnerabilities }}\nTODOs: ${{ needs.code_quality.outputs.todos }}\"}"
