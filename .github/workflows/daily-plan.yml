name: Daily Plan (JST 06:30)

# Replaces daily-research.yml. Each morning at JST 06:30 (UTC 21:30):
#   1. Fetch external feeds (NIST / EIPs / arxiv / competitor releases)
#   2. Sonnet 4.6 produces a prioritized update plan + diffs for mechanical P0
#   3. Open a briefing PR with the daily plan markdown
#   4. For each mechanical action with a diff, open a separate draft PR
#   5. Post headline + P0 list to Slack
#
# 2026-05-08: nudge re-index — first merge appeared 404 in GitHub UI,
# same workaround as commit bf27cb88 for phase1-manual-verify.

on:
  schedule:
    - cron: '30 21 * * *'  # UTC 21:30 = JST 06:30
  workflow_dispatch:
  # Self-test trigger: any change to the workflow or its script reruns it.
  # Doubles as a bootstrap so GitHub registers the workflow_dispatch URL
  # without waiting for the first scheduled run (the comment-only nudge
  # in PR #174 was insufficient — schedule+dispatch-only workflows aren't
  # exposed by /actions/workflows/<file>.yml until at least one run exists).
  push:
    branches: [main]
    paths:
      - '.github/workflows/daily-plan.yml'
      - 'scripts/run-daily-plan.js'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  plan:
    name: Generate daily update plan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code@latest
          claude --version

      - name: Run daily plan generation
        id: plan
        env:
          # Auth: try OAuth (Pro/Max subscription quota), fall back to API key.
          # Adding both removes the single-vendor kill switch on the cron pipeline.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # W19.5 fix: github.com feeds (api.github.com/* + releases.atom)
          # were rate-limited 403 on inaugural run — fetchText now sends
          # Authorization: token <GITHUB_TOKEN> when this var is present.
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/run-daily-plan.js

      - name: Configure git
        if: steps.plan.outputs.report_path != ''
        run: |
          git config user.name "QS Daily Plan Bot"
          git config user.email "daily-plan@quantum-shield.xyz"

      - name: Open briefing PR
        if: steps.plan.outputs.report_path != ''
        env:
          GH_TOKEN: ${{ github.token }}
          DATE: ${{ steps.plan.outputs.date }}
          HEADLINE: ${{ steps.plan.outputs.headline }}
          P0_COUNT: ${{ steps.plan.outputs.p0_count }}
        run: |
          set -euo pipefail
          BRANCH="research/daily-plan-${DATE}"

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH already exists on remote — skipping briefing PR"
            exit 0
          fi

          git checkout -b "$BRANCH"
          git add docs/intelligence/daily-plan/
          if git diff --staged --quiet; then
            echo "No briefing changes to commit"
            exit 0
          fi
          git commit -m "research: daily plan ${DATE}"

          for attempt in 1 2 3 4; do
            if git push -u origin "$BRANCH"; then break; fi
            sleep $((2 ** attempt))
          done

          # Idempotent label bootstrap. gh pr create --label fails if any
          # listed label is missing, so we ensure both exist.
          gh label create auto-generated --color "EDEDED" --description "Created automatically by a workflow" 2>/dev/null || true
          gh label create daily-plan --color "1D76DB" --description "Daily JST 06:30 briefing" 2>/dev/null || true

          {
            printf 'Auto-generated by `daily-plan.yml` at JST 06:30.\n\n'
            printf '**Headline:** %s\n' "$HEADLINE"
            printf '**P0 actions today:** %s\n\n' "$P0_COUNT"
            printf 'Docs-only change. Review the plan, merge if useful, then look for any auto-opened draft PRs (label `daily-plan-action`) for mechanical P0 items.\n'
          } > /tmp/briefing-body.md

          gh pr create \
            --title "Daily Plan ${DATE}" \
            --body-file /tmp/briefing-body.md \
            --base main \
            --head "$BRANCH" \
            --label "auto-generated,daily-plan"

      - name: Open draft PRs for mechanical P0 actions
        if: steps.plan.outputs.has_mechanical_actions == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          DATE: ${{ steps.plan.outputs.date }}
          ACTIONS_PATH: ${{ steps.plan.outputs.actions_path }}
        run: |
          set -euo pipefail
          if [ ! -f "$ACTIONS_PATH" ]; then
            echo "Actions file missing — skipping"
            exit 0
          fi

          # Reset to main so each action PR is a clean diff against main.
          git fetch origin main
          git checkout origin/main

          gh label create auto-generated --color "EDEDED" --description "Created automatically by a workflow" 2>/dev/null || true
          gh label create daily-plan-action --color "5319E7" --description "Auto-drafted mechanical P0 action" 2>/dev/null || true

          # Iterate actions where mechanical=true AND diff is non-empty.
          ACTION_COUNT=$(jq '[.actions[] | select(.mechanical == true and (.diff // "") != "")] | length' "$ACTIONS_PATH")
          echo "Mechanical actions to draft: $ACTION_COUNT"

          # Each iteration is wrapped in a subshell so a failure in one action
          # never aborts the whole step. Per-action diagnostics are printed.
          for i in $(seq 0 $((ACTION_COUNT - 1))); do
            (
              # Reset to a clean origin/main inside this subshell.
              git checkout origin/main 2>/dev/null || true
              git reset --hard origin/main 2>/dev/null || true
              git clean -fdx 2>/dev/null || true

              TITLE=$(jq -r ".actions | map(select(.mechanical == true and (.diff // \"\") != \"\"))[$i].title" "$ACTIONS_PATH")
              SLUG=$(jq -r ".actions | map(select(.mechanical == true and (.diff // \"\") != \"\"))[$i].branch_suffix" "$ACTIONS_PATH")
              RATIONALE=$(jq -r ".actions | map(select(.mechanical == true and (.diff // \"\") != \"\"))[$i].rationale" "$ACTIONS_PATH")
              DIFF=$(jq -r ".actions | map(select(.mechanical == true and (.diff // \"\") != \"\"))[$i].diff" "$ACTIONS_PATH")

              # Validate SLUG: must be non-empty kebab-case, no slashes/spaces.
              if [ -z "$SLUG" ] || [ "$SLUG" = "null" ]; then
                echo "[action $i] empty/null branch_suffix — skipping"
                exit 0
              fi
              if echo "$SLUG" | grep -qE '[^a-zA-Z0-9_-]'; then
                echo "[action $i] branch_suffix has invalid chars: $SLUG — skipping"
                exit 0
              fi

              BRANCH="auto/daily-plan-${DATE}-${SLUG}"
              if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
                echo "[action $i] branch $BRANCH already exists on remote — skipping"
                exit 0
              fi

              git checkout -B "$BRANCH" origin/main

              # Apply the diff.
              if ! printf '%s\n' "$DIFF" | git apply --whitespace=fix -; then
                echo "[action $i] git apply failed — skipping"
                exit 0
              fi

              # Safety scan: refuse the patch if it touched protected paths.
              CHANGED=$(git diff --name-only)
              if echo "$CHANGED" | grep -qE '^(src/api/api/src/|src/frontend/web/src/|src/contracts/|\.claude/settings\.json$|CLAUDE\.md$|\.claude/rules/blockchain\.md$)'; then
                echo "[action $i] patch touched protected path — aborting"
                echo "$CHANGED"
                exit 0
              fi

              git add -A
              if git diff --staged --quiet; then
                echo "[action $i] empty diff after apply — skipping"
                exit 0
              fi

              git commit -m "auto: ${TITLE} (daily-plan ${DATE})"

              PUSHED=0
              for attempt in 1 2 3 4; do
                if git push -u origin "$BRANCH"; then PUSHED=1; break; fi
                sleep $((2 ** attempt))
              done
              if [ "$PUSHED" -eq 0 ]; then
                echo "[action $i] git push failed after 4 attempts — skipping"
                exit 0
              fi

              {
                printf 'Auto-drafted by daily-plan %s.\n\n' "$DATE"
                printf '**Action**: %s\n\n' "$TITLE"
                printf '**Rationale**:\n%s\n\n' "$RATIONALE"
                printf 'This PR was generated mechanically from the daily plan and is opened as a draft. Review the diff carefully — the bot follows guard rails (no source under `src/`, no contract addresses, < 80 line diff) but is not infallible.\n\n'
                printf 'See the full briefing: `docs/intelligence/daily-plan/%s.md`.\n' "$DATE"
              } > /tmp/action-body.md

              if ! gh pr create \
                --draft \
                --title "[daily-plan ${DATE}] ${TITLE}" \
                --body-file /tmp/action-body.md \
                --base main \
                --head "$BRANCH" \
                --label "auto-generated,daily-plan-action" 2>&1; then
                echo "[action $i] gh pr create failed — branch is pushed but PR not opened"
                exit 0
              fi
              echo "[action $i] draft PR opened"
            ) || echo "[action $i] subshell exited non-zero — continuing to next action"
          done
