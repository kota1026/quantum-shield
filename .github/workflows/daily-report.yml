name: Daily Agent Report

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  purpose_guardian:
    name: Purpose Guardian
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.check.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Run Checks
        id: check
        run: |
          STATUS="PASS"
          SORRY=$(grep -r 'sorry' proofs/lean4/*.lean 2>/dev/null | wc -l || echo "0")
          if [ "$SORRY" -gt "0" ]; then
            STATUS="FAIL"
          fi
          echo "status=$STATUS" >> $GITHUB_OUTPUT

  crypto_auditor:
    name: Crypto Auditor
    runs-on: ubuntu-latest
    needs: purpose_guardian
    outputs:
      status: ${{ steps.check.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Run Crypto Audit
        id: check
        run: |
          STATUS="PASS"
          cd circuits/dilithium-stark 2>/dev/null || true
          if cargo test test_nist_kat 2>&1 | grep -q "FAILED"; then
            STATUS="FAIL"
          fi
          echo "status=$STATUS" >> $GITHUB_OUTPUT
        continue-on-error: true

  red_team:
    name: Red Team
    runs-on: ubuntu-latest
    needs: purpose_guardian
    outputs:
      status: ${{ steps.check.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet || true
      - name: Run Security Checks
        id: check
        run: |
          STATUS="PASS"
          if cargo audit 2>&1 | grep -qi "vulnerability"; then
            STATUS="FAIL"
          fi
          echo "status=$STATUS" >> $GITHUB_OUTPUT
        continue-on-error: true

  engineer:
    name: Engineer
    runs-on: ubuntu-latest
    needs: [crypto_auditor, red_team]
    outputs:
      status: ${{ steps.check.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Run Quality Checks
        id: check
        run: |
          STATUS="PASS"
          if ! cargo fmt --check 2>/dev/null; then
            STATUS="PARTIAL"
          fi
          echo "status=$STATUS" >> $GITHUB_OUTPUT
        continue-on-error: true

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [purpose_guardian, crypto_auditor, red_team, engineer]
    if: always()
    steps:
      - name: Determine Status
        id: status
        run: |
          PG="${{ needs.purpose_guardian.outputs.status }}"
          CA="${{ needs.crypto_auditor.outputs.status }}"
          RT="${{ needs.red_team.outputs.status }}"
          if [[ "$PG" == "FAIL" ]] || [[ "$CA" == "FAIL" ]] || [[ "$RT" == "FAIL" ]]; then
            echo "overall=FAIL" >> $GITHUB_OUTPUT
          else
            echo "overall=PASS" >> $GITHUB_OUTPUT
          fi

      - name: Create Issue on Fail
        if: steps.status.outputs.overall == 'FAIL'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Daily Report FAIL - ' + date,
              body: 'Agent verification detected issues.\n\nPurpose Guardian: ${{ needs.purpose_guardian.outputs.status }}\nCrypto Auditor: ${{ needs.crypto_auditor.outputs.status }}\nRed Team: ${{ needs.red_team.outputs.status }}\nEngineer: ${{ needs.engineer.outputs.status }}\n\n@kota1026 Please review.',
              labels: ['agent-report', 'automated'],
              assignees: ['kota1026']
            });

      - name: Slack Notification
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          OVERALL="${{ steps.status.outputs.overall }}"
          curl -X POST "$SLACK_WEBHOOK_URL" -H 'Content-type: application/json' \
            -d "{\"text\":\"Daily Agent Report: $OVERALL\nPG: ${{ needs.purpose_guardian.outputs.status }} | CA: ${{ needs.crypto_auditor.outputs.status }} | RT: ${{ needs.red_team.outputs.status }} | ENG: ${{ needs.engineer.outputs.status }}\"}"
