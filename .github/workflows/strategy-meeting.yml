name: Strategy Meeting
on:
  repository_dispatch:
    types: [strategy-meeting]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: full, quick, security'
        default: 'quick'

env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  meeting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/phase2-native-stark
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install anthropic
      
      - name: Get Mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "mode=${{ github.event.client_payload.mode }}" >> $GITHUB_OUTPUT
          else
            echo "mode=${{ github.event.inputs.mode || 'quick' }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Run Agent Analysis
        run: python scripts/agent_meeting.py ${{ steps.mode.outputs.mode }}
