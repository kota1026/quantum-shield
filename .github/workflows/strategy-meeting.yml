name: Strategy Meeting
on:
  repository_dispatch:
    types: [strategy-meeting]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: full, quick, security'
        default: 'quick'

env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  meeting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/phase2-native-stark
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install anthropic requests
      
      - name: Get Mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "mode=${{ github.event.client_payload.mode }}" >> $GITHUB_OUTPUT
          else
            echo "mode=${{ github.event.inputs.mode || 'quick' }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Run Agent Analysis
        run: |
          python3 << 'EOF'
          import anthropic
          import json
          import os
          import urllib.request
          
          client = anthropic.Anthropic()
          mode = "${{ steps.mode.outputs.mode }}" or "quick"
          webhook_url = os.environ.get("SLACK_WEBHOOK_URL")
          
          def send_slack(text):
              payload = json.dumps({"text": text}).encode('utf-8')
              req = urllib.request.Request(webhook_url, data=payload, headers={'Content-Type': 'application/json'})
              urllib.request.urlopen(req)
          
          send_slack(f"🎯 *戦略会議開始* - モード: {mode}\n\n🤖 AIエージェントがコード分析中...")
          
          files_to_analyze = []
          for path in ["PURPOSE.md", "README.md", "Cargo.toml"]
