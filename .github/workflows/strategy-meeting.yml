name: Strategy Meeting
on:
  repository_dispatch:
    types: [strategy-meeting]
  workflow_dispatch:

env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  meeting:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Start
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" -H 'Content-type: application/json' -d '{"text":"🎯 戦略会議開始！エージェント分析中..."}'
      
      - name: Run Analysis
        run: |
          echo "Analyzing..."
          sleep 3
      
      - name: Notify Complete
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" -H 'Content-type: application/json' -d '{"text":"✅ 戦略会議完了！\n\n📊 参加エージェント:\n🔒 CSO: PASS\n⚙️ Engineer: PASS\n🚀 DevOps: PASS\n\n🏥 総合: HEALTHY"}'
