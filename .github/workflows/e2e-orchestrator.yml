name: E2E Orchestrator

on:
  push:
    branches: [main]
    paths:
      - 'src/api/api/**'
      - 'src/frontend/web/**'
      - 'src/contracts/**'
      - 'src/agents/e2e-orchestrator/**'
      - 'docs/core/SEQUENCES.md'
      - '.github/workflows/e2e-orchestrator.yml'
  pull_request:
    paths:
      - 'src/api/api/**'
      - 'src/frontend/web/**'
      - 'src/contracts/**'
      - 'src/agents/e2e-orchestrator/**'
      - 'docs/core/SEQUENCES.md'
  workflow_dispatch:
    inputs:
      sequence:
        description: 'Sequence to verify (lock | unlock | prover | challenge | emergency | slashing | all). Leave blank to use the trigger-derived matrix.'
        required: false
        default: ''
        type: string
      no_ai:
        description: 'Deterministic mode — skip Anthropic stages, verdict from layer exit codes only'
        required: false
        default: false
        type: boolean
      run_emergency:
        description: 'Include the emergency-unlock sequence (default off in PR builds, on in nightly)'
        required: false
        default: false
        type: boolean
      run_slashing:
        description: 'Include the slashing sequence (default off; depends on resolveChallenge availability — Phase 3.x)'
        required: false
        default: false
        type: boolean
  schedule:
    # Daily 21:17 UTC = 06:17 JST. Off-peak so we don't compete with morning PRs.
    - cron: '17 21 * * *'

permissions:
  contents: write   # auto-commit run outputs to docs/orchestrator-runs/

jobs:
  # Compute the matrix axis once so the `verify` job can fan out per sequence.
  # Logic (Phase 3 PR5/5):
  #   - workflow_dispatch with explicit `inputs.sequence` set       → that single sequence (back-compat).
  #   - workflow_dispatch with run_slashing=true AND run_emergency=true
  #                                                                 → [lock, unlock, prover, challenge, emergency, slashing] (full Phase 1+2+3 + extras).
  #   - workflow_dispatch with `run_emergency=true`                 → [lock, unlock, prover, challenge, emergency] (Phase 1+2 default + Phase 3 default).
  #   - workflow_dispatch with `run_slashing=true` (alone)          → [lock, unlock, prover, challenge, slashing].
  #   - schedule (nightly cron 21:17 UTC = 06:17 JST)               → [lock, unlock, prover, challenge] (Phase 3 default).
  #   - workflow_dispatch default                                   → [lock, unlock, prover, challenge] (same as nightly).
  #   - push / pull_request                                         → [lock] only (smoke check, no bond burn).
  #
  # Sepolia bond budget per nightly run (Phase 3):
  #   - lock:      ~0.09 ETH (per-leg overhead + L1 lock submission gas)
  #   - unlock:    ~0.005 ETH (gas only — no bond)
  #   - prover:    ~0.0002 ETH (testnetMode=true → 0 ETH stake + register gas)
  #   - challenge: ~0.105 ETH (0.1 ETH MIN_CHALLENGE_BOND per L1VaultTestnet.sol:56 + gas)
  #   Total nightly without emergency: ~0.2 ETH/run.
  #   Total nightly with emergency:    ~0.7 ETH/run (adds 0.5 ETH MIN_BOND_WEI for emergency).
  # Deployer wallet sits at ~0.43 ETH after recent Phase 2 runs — first nightly with
  # the full Phase 3 matrix (lock+unlock+prover+challenge ≈ 0.2 ETH) is sustainable;
  # `run_emergency=true` operator-triggered runs may need a faucet topup first.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      sequences: ${{ steps.matrix.outputs.sequences }}
    steps:
      - id: matrix
        env:
          INPUT_SEQUENCE: ${{ inputs.sequence }}
          INPUT_RUN_EMERGENCY: ${{ inputs.run_emergency }}
          INPUT_RUN_SLASHING: ${{ inputs.run_slashing }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # 2026-05-09 (Phase 3 PR5/5): schedule now fans out across the four
          # always-on Phase 1+2+3 sequences (lock, unlock, prover, challenge).
          # Adding prover+challenge to the nightly default costs only ~0.105
          # ETH/run extra (prover stake is 0 in testnetMode; challenge bond is
          # 0.1 ETH per L1VaultTestnet.sol:56), so total nightly burn is
          # ~0.2 ETH/run and stays well inside the deployer wallet's runway.
          #
          # Emergency (0.5 ETH MIN_BOND_WEI) and slashing (depends on the
          # resolveChallenge nightly job — Q4 strategy (c) defers that to
          # Phase 3.x) remain opt-in via workflow_dispatch flags so a single
          # operator-triggered run can include them deliberately:
          #   gh workflow run e2e-orchestrator.yml -f run_emergency=true
          #   gh workflow run e2e-orchestrator.yml -f run_slashing=true
          #   gh workflow run e2e-orchestrator.yml -f run_emergency=true -f run_slashing=true
          if [ -n "$INPUT_SEQUENCE" ]; then
            # Explicit single-sequence override (back-compat with Phase 2 PR5/5).
            SEQS="[\"$INPUT_SEQUENCE\"]"
          elif [ "$INPUT_RUN_EMERGENCY" = "true" ] && [ "$INPUT_RUN_SLASHING" = "true" ]; then
            # Operator opted into both extras — full Phase 1+2+3 + emergency + slashing.
            # Cost: ~0.7 ETH/run. Verify wallet balance before triggering.
            SEQS='["lock","unlock","prover","challenge","emergency","slashing"]'
          elif [ "$INPUT_RUN_EMERGENCY" = "true" ]; then
            # Phase 1+2 default + Phase 3 default + emergency. Cost: ~0.7 ETH/run.
            SEQS='["lock","unlock","prover","challenge","emergency"]'
          elif [ "$INPUT_RUN_SLASHING" = "true" ]; then
            # Phase 1+2 default + Phase 3 default + slashing. Cost: ~0.2 ETH/run
            # (slashing leg verifies challenge request only; resolveChallenge
            # nightly job deferred to Phase 3.x per Q4 strategy (c)).
            SEQS='["lock","unlock","prover","challenge","slashing"]'
          elif [ "$EVENT_NAME" = "push" ] || [ "$EVENT_NAME" = "pull_request" ]; then
            # PR/push smoke check — single lock leg, no bond burn.
            SEQS='["lock"]'
          else
            # schedule (nightly) and workflow_dispatch default — Phase 3 default.
            # Cost: ~0.2 ETH/run.
            SEQS='["lock","unlock","prover","challenge"]'
          fi
          echo "sequences=$SEQS" >> "$GITHUB_OUTPUT"
          echo "Matrix sequences: $SEQS"

  verify:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      # 2026-05-09: serialize matrix legs. Run 25594074126 had two parallel
      # legs (lock + unlock) sharing the deployer wallet — the unlock leg
      # ran 9 seconds ahead, drained the wallet on its own seq2 lock
      # prerequisites, and the lock leg's first lockWithSR0 then failed
      # with `(code: -32000, message: insufficient funds for transfer)`.
      # `max-parallel: 1` runs legs sequentially so each leg sees a
      # predictable balance. Wall-clock is ~2× but the wallet doesn't
      # race with itself. Future option: separate prover/observer wallets
      # (Phase 3 may need that anyway), at which point this can be lifted.
      max-parallel: 1
      matrix:
        sequence: ${{ fromJSON(needs.prepare.outputs.sequences) }}
    name: verify (${{ matrix.sequence }})
    # 2026-05-03: target the `sepolia` GitHub Actions environment so this
    # job can read environment-scoped secrets — specifically
    # DEPLOYER_PRIVATE_KEY, which deploy-testnet.yml configured under
    # `environment: ${{ inputs.network }}` (= sepolia). Without this
    # line the secret resolved to an empty string in the env block:
    # bash diagnostic in the Start-backend step said "EMPTY" while
    # main.rs:50's `is_ok()` check still reported "SET" (Ok("")), and
    # L1VaultService::new failed against the empty private key, hit the
    # silent-fallback warn+None at services/mod.rs:215-218, and every
    # CI lock got `l1_tx_hash=NULL`. Run 25267401162's api-server.log
    # made all of this visible for the first time.
    environment: sepolia
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: quantum
          POSTGRES_PASSWORD: quantum_dev
          POSTGRES_DB: quantum_shield
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7
        ports: [6379:6379]

    env:
      DATABASE_URL: postgresql://quantum:quantum_dev@localhost:5432/quantum_shield
      # CI talks to real Sepolia, not a fork. Fork-based CI (Track H,
      # 2026-05-02) was reverted same-day: this protocol's value
      # proposition is verifiable on-chain activity (Etherscan-visible
      # PQC custody), so CI must produce real Sepolia receipts. The
      # public publicnode endpoint is the fallback; the SEPOLIA_RPC_URL
      # secret (Infura/Alchemy) takes precedence when configured.
      L1_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL || 'https://ethereum-sepolia-rpc.publicnode.com' }}
      L3_RPC_URL: http://localhost:8545
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # The orchestrator is the closest thing we have to a production
      # smoke check, so it must run with real signature/TOTP verification
      # and real (non-zero) time-locks. Default config has DEMO values
      # (skip=true, time-lock=0) which is fine on local Anvil but unsafe
      # on Sepolia (chain_id=11155111, the CI L1). The hardened
      # `enforce_production_guards` (config.rs::enforce_production_guards)
      # panics on testnet boot if any of these are unsafe — these env
      # overrides keep the CI runner inside the safe regime. Run
      # 25155587002's "signature bypass" finding came from the orchestrator
      # submitting a wrong-key signature and getting HTTP 200 because
      # skip=true was the testnet default.
      QS__SECURITY__SKIP_SIGNATURE_VERIFICATION: "false"
      QS__SECURITY__SKIP_TOTP_VERIFICATION: "false"
      QS__SECURITY__NORMAL_TIME_LOCK_HOURS: "24"
      QS__SECURITY__EMERGENCY_TIME_LOCK_DAYS: "7"
      # CI signing wallet for Sepolia. Reuses the same DEPLOYER_PRIVATE_KEY
      # secret that deploy-testnet.yml:136 already uses for contract
      # deployments — that wallet is already funded with Sepolia ETH.
      # Sharing one wallet between deploys and CI locks is intentional
      # for now: cheaper to operate (one faucet, one balance), and the
      # blast radius is identical (anything that compromises this key
      # already controls the deployer). Rotate later if the threat
      # model changes.
      QS__L1_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
      # The matrix axis: one of lock | unlock | prover | challenge | emergency | slashing. Threaded through to
      # the orchestrator CLI (`pnpm verify --sequence "$SEQUENCE"`) and into
      # run-info.json so each leg's auto-committed artifact is named per leg.
      SEQUENCE: ${{ matrix.sequence }}

    steps:
      - uses: actions/checkout@v4

      - name: Skip if no API key
        if: env.ANTHROPIC_API_KEY == ''
        run: |
          echo "::warning::ANTHROPIC_API_KEY not set; orchestrator skipped."
          exit 0

      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            src/agents/e2e-orchestrator/pnpm-lock.yaml
            src/frontend/web/pnpm-lock.yaml

      - name: Install Foundry (cast)
        uses: foundry-rs/foundry-toolchain@v1

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src/api/api'

      - name: Install orchestrator deps
        working-directory: src/agents/e2e-orchestrator
        run: pnpm install --frozen-lockfile

      # Orchestrator finding (run 25053424860 verdict.json):
      # frontend layer skipped because @playwright/test was missing in
      # src/frontend/web/node_modules. The Lock sequence binding
      # invokes `npx playwright test e2e/integration/lock.integration.spec.ts`
      # from src/frontend/web, but we never ran `pnpm install` there.
      - name: Install frontend deps (for Playwright integration tests)
        working-directory: src/frontend/web
        run: pnpm install --frozen-lockfile

      - name: Type-check orchestrator
        working-directory: src/agents/e2e-orchestrator
        run: pnpm lint

      - name: Build backend (release)
        working-directory: src/api/api
        run: SQLX_OFFLINE=true cargo build --bin api-server --release
        env:
          DATABASE_URL: postgresql://quantum:quantum_dev@localhost:5432/quantum_shield

      # Pre-compile the e2e test binary so the orchestrator's per-step
      # 120s timeout (DEFAULT_TIMEOUT_MS in exec.ts) doesn't get burned on
      # a fresh debug compile of axum + sqlx + ethers. Observed in run
      # 25149846972: backend layer exited 1 at exactly 120s with empty
      # stdout because the binary was still being built when SIGTERM hit.
      # Subsequent runs are cached by Swatinem/rust-cache@v2 above.
      - name: Pre-compile e2e test binary
        working-directory: src/api/api
        run: SQLX_OFFLINE=true cargo test --test sequence_e2e_test --no-run
        env:
          DATABASE_URL: postgresql://quantum:quantum_dev@localhost:5432/quantum_shield

      - name: Run migrations
        working-directory: src/api/api
        run: cargo install sqlx-cli --version 0.7.4 --no-default-features --features postgres,native-tls --locked && sqlx migrate run

      - name: Start backend API server
        working-directory: src/api/api
        run: |
          # Capture the api-server's stdout+stderr into a file under the
          # docs/orchestrator-runs/<run_id>/ tree. The auto-commit step
          # at the end of this workflow picks the whole tree up, so we
          # can read the [STARTUP] lines and L1Vault init result from
          # main on the next CI cycle. Without this, every startup
          # diagnostic disappears into the GH Actions step log that
          # the MCP API can't fetch.
          API_LOG_DIR="${{ github.workspace }}/docs/orchestrator-runs/e2e/${{ github.run_id }}/${SEQUENCE}"
          mkdir -p "$API_LOG_DIR"
          API_LOG="$API_LOG_DIR/api-server.log"

          # Diagnostic: confirm DEPLOYER_PRIVATE_KEY secret resolved to a
          # non-empty value before we start the server. Print only the
          # length so we never leak the key into logs. Tee'd into both
          # the workflow log and the captured api-server log file so it
          # appears in both places.
          {
            if [ -z "$QS__L1_PRIVATE_KEY" ]; then
              echo "::warning::QS__L1_PRIVATE_KEY is EMPTY — DEPLOYER_PRIVATE_KEY secret may not be set; lock submission to L1 will silently no-op"
            else
              echo "QS__L1_PRIVATE_KEY length: ${#QS__L1_PRIVATE_KEY} (non-empty)"
            fi
            echo "QS__L1_RPC_URL: ${{ env.L1_RPC_URL }}"
          } | tee "$API_LOG"

          # 2026-05-02: corrected env var name. The previous
          # `QS__L1__RPC_URL` (double underscore between L1 and RPC_URL)
          # was parsed by the `config` crate as nested `l1.rpc_url`,
          # NOT the top-level `l1_rpc_url` field that
          # services/mod.rs:196-200 actually reads. Result: api-server
          # used default.yaml's `https://rpc.sepolia.org` (Cloudflare
          # 522) for L1 init, while the orchestrator's bash steps used
          # publicnode for `cast call`. The L1Vault construction failed
          # against the dead URL, hit the silent-fallback warn+None at
          # services/mod.rs:215-218, and lock creation went into the
          # "L1 not configured" branch. Single underscore = top-level.
          QS__DATABASE__URL=postgresql://quantum:quantum_dev@localhost:5432/quantum_shield \
          QS__L1_RPC_URL=${{ env.L1_RPC_URL }} \
            ../../../target/release/api-server >> "$API_LOG" 2>&1 &
          echo "Waiting for backend on :8080..."
          for i in {1..60}; do
            curl -sf http://localhost:8080/v1/health > /dev/null && echo "backend ready" && break
            sleep 2
          done
          # Print the api-server log tail to the workflow log too, so
          # the GH Actions UI shows the startup sequence even if the
          # auto-commit doesn't run for some reason (e.g. PR mode).
          echo "=== api-server startup log (last 60 lines) ==="
          tail -60 "$API_LOG" || echo "(no api-server log captured)"
          echo "=== end api-server startup log ==="

      - name: Run orchestrator
        id: orchestrator
        working-directory: src/agents/e2e-orchestrator
        env:
          REPO_ROOT: ${{ github.workspace }}
          REPORTS_DIR: ${{ github.workspace }}/src/agents/e2e-orchestrator/reports
          # Skip every Anthropic-dependent stage when the workflow_dispatch
          # input requests it. Verdict is then a deterministic function of
          # the Stage 2 layer exit codes (orchestrator.ts NO_AI branch).
          NO_AI: ${{ inputs.no_ai && '1' || '' }}
        continue-on-error: true
        run: |
          set -o pipefail
          LOG_DIR="${{ github.workspace }}/docs/orchestrator-runs/e2e/${{ github.run_id }}/${SEQUENCE}"
          mkdir -p "$LOG_DIR"
          LOG="$LOG_DIR/orchestrator-stdout.log"

          {
            echo "=== diagnostic ==="
            echo "pwd: $(pwd)"
            echo "REPO_ROOT: $REPO_ROOT"
            echo "REPORTS_DIR: $REPORTS_DIR"
            echo "ANTHROPIC_API_KEY length: ${#ANTHROPIC_API_KEY} (prefix: ${ANTHROPIC_API_KEY:0:8}...)"
            echo "DATABASE_URL: $DATABASE_URL"
            echo "L1_RPC_URL: $L1_RPC_URL"
            echo ""
            echo "=== :8080 backend reachability ==="
            curl -sv --max-time 5 "http://localhost:8080/v1/health" 2>&1 | head -25 || echo "(curl failed)"
            echo ""
            echo "=== node + pnpm ==="
            node --version || echo "node missing"
            pnpm --version || echo "pnpm missing"
            echo ""
            echo "=== orchestrator run ==="
          } | tee "$LOG"

          mkdir -p reports
          pnpm verify --sequence "$SEQUENCE" \
            2>&1 | tee -a "$LOG"
          EXIT_CODE=${PIPESTATUS[0]}
          echo "" | tee -a "$LOG"
          echo "=== orchestrator exit code: $EXIT_CODE ===" | tee -a "$LOG"
          echo "=== final ls reports/ ===" | tee -a "$LOG"
          ls -la reports/ 2>&1 | tee -a "$LOG"
          echo "=== END LOG ===" | tee -a "$LOG"
          exit 0

      - name: Summarize orchestrator verdict
        if: always()
        working-directory: src/agents/e2e-orchestrator
        run: |
          echo "## E2E Orchestrator verdict — sequence: \`$SEQUENCE\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d reports ]; then
            latest=$(ls -1dt reports/*/ 2>/dev/null | head -1)
            if [ -n "$latest" ] && [ -f "$latest/verdict.json" ]; then
              echo '```json' >> $GITHUB_STEP_SUMMARY
              cat "$latest/verdict.json" >> $GITHUB_STEP_SUMMARY
              echo '' >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              if [ -f "$latest/report.md" ]; then
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "### Full report" >> $GITHUB_STEP_SUMMARY
                cat "$latest/report.md" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "_(orchestrator did not produce a verdict — see Run orchestrator step output)_" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "_(no reports/ directory — orchestrator likely crashed during setup; see Run orchestrator step)_" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-orchestrator-report-${{ matrix.sequence }}
          path: src/agents/e2e-orchestrator/reports/
          retention-days: 14

      - name: Commit run output to docs/orchestrator-runs/
        # Skip on pull_request (would push to PR branch from the PR runner —
        # noisy and conflicts with branch-protection in many setups). Run on
        # push/schedule/dispatch where we have a stable target branch.
        if: always() && github.event_name != 'pull_request'
        run: |
          set -e
          # Per-leg subfolder so parallel matrix legs don't clobber each other's
          # reports/ tree when racing on `git push`. Auto-rebase below absorbs
          # benign cross-leg conflicts.
          DEST="docs/orchestrator-runs/e2e/${{ github.run_id }}/${SEQUENCE}"
          mkdir -p "$DEST"
          if [ -d src/agents/e2e-orchestrator/reports ]; then
            cp -r src/agents/e2e-orchestrator/reports/. "$DEST/" 2>/dev/null || true
          fi
          if [ -f /tmp/e2e-orchestrator-stdout.log ]; then
            cp /tmp/e2e-orchestrator-stdout.log "$DEST/orchestrator-stdout.log"
          fi
          # Always write a run-info marker so Claude can find this run via the
          # filesystem even if reports/ is empty.
          cat > "$DEST/run-info.json" <<EOF
          {
            "run_id": "${{ github.run_id }}",
            "workflow": "e2e-orchestrator",
            "sequence": "${SEQUENCE}",
            "sha": "${{ github.sha }}",
            "trigger": "${{ github.event_name }}",
            "actor": "${{ github.actor }}",
            "started_at": "$(date -u -Iseconds)"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/orchestrator-runs/
          # `[skip ci]` prevents the commit from re-triggering this workflow.
          git diff --cached --quiet || git commit -m "ci(e2e-orchestrator): run ${{ github.run_id }} [${SEQUENCE}] [skip ci]"
          # Pull --rebase in case main moved during the long cargo build, or
          # because a sibling matrix leg pushed first.
          for attempt in 1 2 3; do
            git pull --rebase origin main 2>/dev/null || true
            if git push origin HEAD:main; then
              break
            fi
            echo "::warning::push attempt $attempt failed (likely sibling matrix leg won the race); retrying"
            sleep $((attempt * 3))
          done || echo "::warning::could not push run output (likely branch protection); artifact still available"
