[profile.default]
src = "src/l1/contracts"
out = "out"
libs = ["lib", "src/l1/contracts/lib"]
test = "src/l1/test"
script = "src/l1/contracts/script"

# Solidity settings
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true

# Testing
fuzz = { runs = 256 }
verbosity = 2

# Gas reporting
gas_reports = ["QuantumShield"]

# Remappings
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/=src/l1/contracts/lib/openzeppelin-contracts/",
    "lib/openzeppelin-contracts/=src/l1/contracts/lib/openzeppelin-contracts/",
    "@qs/=src/l1/contracts/src/"
]

# File system permissions for scripts
fs_permissions = [{ access = "read-write", path = "./" }]

[profile.l3]
src = "src/l3/src"
out = "out-l3"
libs = ["lib"]
script = "src/l3/script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/=src/l1/contracts/lib/openzeppelin-contracts/"
]
fs_permissions = [{ access = "read-write", path = "./" }]

[profile.ci]
fuzz = { runs = 10000 }
verbosity = 3

# Invariant testing configuration
# Target: 1,000,000+ calls (runs × depth = total calls)
[invariant]
runs = 1024           # Number of invariant test runs
depth = 1000          # Calls per run (1024 × 1000 = 1,024,000 calls)
fail_on_revert = false
call_override = false

[profile.stress]
fuzz = { runs = 100000 }
invariant = { runs = 2048, depth = 1000 }  # 2,048,000 calls

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

[doc]
out = "docs"
title = "Quantum Shield Bridge"
