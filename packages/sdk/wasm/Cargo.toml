[package]
name = "quantum-shield-wasm"
version = "0.1.0"
edition = "2021"
description = "Quantum Shield Dilithium WASM Module - FIPS 204 ML-DSA-65"
license = "MIT OR Apache-2.0"
repository = "https://github.com/kota1026/quantum-shield"
keywords = ["quantum", "cryptography", "dilithium", "wasm", "post-quantum"]

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["console_error_panic_hook"]

[dependencies]
wasm-bindgen = "0.2.92"
js-sys = "0.3.69"
fips204 = { version = "0.4.0", features = ["ml-dsa-65"] }
sha3 = "0.10.8"
getrandom = { version = "0.2", features = ["js"] }
console_error_panic_hook = { version = "0.1.7", optional = true }
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6"
hex = "0.4.3"

[dev-dependencies]
wasm-bindgen-test = "0.3.42"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
