          type: string
          enum: [maintenance, update, security, general]
        target_audience:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [draft, scheduled, published, archived]
        published_at:
          type: integer
          format: int64
          nullable: true
        expires_at:
          type: integer
          format: int64
          nullable: true

    DashboardOverview:
      type: object
      properties:
        tvl:
          type: string
        tvl_change_24h:
          type: number
        active_users:
          type: integer
        active_users_change_24h:
          type: number
        transactions_today:
          type: integer
        prover_uptime:
          type: number
        pending_tasks:
          type: integer

    Alert:
      type: object
      properties:
        alert_id:
          type: string
        rule_id:
          type: string
        severity:
          type: string
          enum: [info, warning, critical]
        message:
          type: string
        status:
          type: string
          enum: [active, acknowledged, resolved]
        triggered_at:
          type: integer
          format: int64

# ========================================
# Admin API Paths (Separate section)
# ========================================

paths:
  # Admin Authentication
  /admin/auth/login:
    post:
      tags: [Admin]
      summary: Admin login with wallet signature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wallet_address, signature, message]
              properties:
                wallet_address:
                  type: string
                signature:
                  type: string
                message:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  admin:
                    $ref: '#/components/schemas/AdminUser'

  /admin/auth/2fa/verify:
    post:
      tags: [Admin]
      summary: Verify 2FA code
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        '200':
          description: 2FA verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified:
                    type: boolean

  # Dashboard
  /admin/dashboard/overview:
    get:
      tags: [Admin]
      summary: Get dashboard overview metrics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardOverview'

  /admin/dashboard/alerts:
    get:
      tags: [Admin]
      summary: Get active alerts
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, acknowledged, resolved]
        - name: severity
          in: query
          schema:
            type: string
            enum: [info, warning, critical]
      responses:
        '200':
          description: List of alerts
          content:
            application/json:
              schema:
                type: object
                properties:
                  alerts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Alert'

  # Ecosystem - Users
  /admin/users:
    get:
      tags: [Admin]
      summary: List all users
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 50
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  total:
                    type: integer

  /admin/users/{wallet_address}:
    get:
      tags: [Admin]
      summary: Get user detail
      security:
        - bearerAuth: []
      parameters:
        - name: wallet_address
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  # Prover Applications
  /admin/applications/prover:
    get:
      tags: [Admin]
      summary: List prover applications
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        '200':
          description: List of applications
          content:
            application/json:
              schema:
                type: object
                properties:
                  applications:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProverApplication'

  /admin/applications/prover/{application_id}/approve:
    post:
      tags: [Admin]
      summary: Approve prover application
      security:
        - bearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
      responses:
        '200':
          description: Application approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  prover_id:
                    type: string

  /admin/applications/prover/{application_id}/reject:
    post:
      tags: [Admin]
      summary: Reject prover application
      security:
        - bearerAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Application rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  # Challenges
  /admin/challenges:
    get:
      tags: [Admin]
      summary: List all challenges
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_defense, resolved, expired]
      responses:
        '200':
          description: List of challenges
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenges:
                    type: array
                    items:
                      $ref: '#/components/schemas/Challenge'

  /admin/challenges/{challenge_id}/intervene:
    post:
      tags: [Admin]
      summary: Admin intervention on challenge
      security:
        - bearerAuth: []
      parameters:
        - name: challenge_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, reason]
              properties:
                action:
                  type: string
                  enum: [approve_challenge, reject_challenge, extend_defense]
                reason:
                  type: string
      responses:
        '200':
          description: Intervention completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  # Treasury
  /admin/treasury/overview:
    get:
      tags: [Admin]
      summary: Get treasury overview
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Treasury overview
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_balance:
                    type: string
                  wallets:
                    type: array
                    items:
                      $ref: '#/components/schemas/TreasuryWallet'

  /admin/treasury/wallets/{wallet_id}/transfer:
    post:
      tags: [Admin]
      summary: Initiate treasury transfer
      security:
        - bearerAuth: []
      parameters:
        - name: wallet_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to_address, amount, purpose]
              properties:
                to_address:
                  type: string
                amount:
                  type: string
                purpose:
                  type: string
      responses:
        '200':
          description: Transfer initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  tx_id:
                    type: string
                  status:
                    type: string

  /admin/treasury/expenses:
    get:
      tags: [Admin]
      summary: List expense requests
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, executed]
      responses:
        '200':
          description: List of expense requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  expenses:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExpenseRequest'
    post:
      tags: [Admin]
      summary: Create expense request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wallet_id, amount, purpose, category]
              properties:
                wallet_id:
                  type: string
                amount:
                  type: string
                purpose:
                  type: string
                category:
                  type: string
      responses:
        '201':
          description: Expense request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseRequest'

  # Emergency Controls
  /admin/emergency/status:
    get:
      tags: [Admin]
      summary: Get system emergency status
      security:
        - bearerAuth: []
      responses:
        '200':
          description: System status
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_paused:
                    type: boolean
                  paused_at:
                    type: integer
                    format: int64
                    nullable: true
                  paused_by:
                    type: string
                    nullable: true
                  services:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        status:
                          type: string
                          enum: [running, paused, error]

  /admin/emergency/pause:
    post:
      tags: [Admin]
      summary: Pause system (emergency)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                services:
                  type: array
                  items:
                    type: string
                  description: Specific services to pause, or all if empty
      responses:
        '200':
          description: System paused
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  paused_services:
                    type: array
                    items:
                      type: string

  /admin/emergency/resume:
    post:
      tags: [Admin]
      summary: Resume system from pause
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                services:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: System resumed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  # Support
  /admin/support/tickets:
    get:
      tags: [Admin]
      summary: List support tickets
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, in_progress, pending, resolved, closed]
        - name: priority
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
      responses:
        '200':
          description: List of tickets
          content:
            application/json:
              schema:
                type: object
                properties:
                  tickets:
                    type: array
                    items:
                      $ref: '#/components/schemas/SupportTicket'

  /admin/support/tickets/{ticket_id}:
    patch:
      tags: [Admin]
      summary: Update support ticket
      security:
        - bearerAuth: []
      parameters:
        - name: ticket_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [open, in_progress, pending, resolved, closed]
                priority:
                  type: string
                  enum: [low, medium, high, critical]
                assigned_to:
                  type: string
      responses:
        '200':
          description: Ticket updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportTicket'

  /admin/support/announcements:
    get:
      tags: [Admin]
      summary: List announcements
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of announcements
          content:
            application/json:
              schema:
                type: object
                properties:
                  announcements:
                    type: array
                    items:
                      $ref: '#/components/schemas/Announcement'
    post:
      tags: [Admin]
      summary: Create announcement
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content, category]
              properties:
                title:
                  type: string
                content:
                  type: string
                category:
                  type: string
                  enum: [maintenance, update, security, general]
                target_audience:
                  type: array
                  items:
                    type: string
                publish_at:
                  type: integer
                  format: int64
                expires_at:
                  type: integer
                  format: int64
      responses:
        '201':
          description: Announcement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Announcement'

  # Audit
  /admin/audit/logs:
    get:
      tags: [Admin]
      summary: Get audit logs
      security:
        - bearerAuth: []
      parameters:
        - name: admin_id
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: resource_type
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: integer
            format: int64
        - name: to
          in: query
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Audit logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminAuditLog'
                  total:
                    type: integer

  # Admin Settings
  /admin/settings/users:
    get:
      tags: [Admin]
      summary: List admin users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of admin users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminUser'
    post:
      tags: [Admin]
      summary: Create admin user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wallet_address, email, name, role_id]
              properties:
                wallet_address:
                  type: string
                email:
                  type: string
                name:
                  type: string
                role_id:
                  type: string
      responses:
        '201':
          description: Admin user created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'

  /admin/settings/users/{admin_id}:
    patch:
      tags: [Admin]
      summary: Update admin user
      security:
        - bearerAuth: []
      parameters:
        - name: admin_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                name:
                  type: string
                role_id:
                  type: string
                status:
                  type: string
                  enum: [active, suspended, revoked]
      responses:
        '200':
          description: Admin user updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
    delete:
      tags: [Admin]
      summary: Revoke admin user
      security:
        - bearerAuth: []
      parameters:
        - name: admin_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Admin user revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
