openapi: 3.0.3
info:
  title: Quantum Shield API
  description: |
    Quantum Shield API Specification

    ## Overview
    Post-quantum secure cross-chain bridge API using ML-DSA-65 (FIPS 204) and SPHINCS+ signatures.

    ## Authentication
    - **SIWE (Sign-In With Ethereum)**: Uses Dilithium-III signature for quantum-safe authentication
    - **JWT**: Access tokens (15min) and refresh tokens (7 days)

    ## Cryptographic Standards (CP-1)
    - User Signatures: ML-DSA-65 (NIST FIPS 204)
    - Prover Signatures: SPHINCS+-128s
    - Hashing: SHA3-256 (NIST FIPS 202)
    - VRF: Chainlink VRF v2.5

    ## Time Locks
    - Normal Unlock: 24 hours
    - Emergency Unlock: 7 days + bond

  version: "2.0.0"
  contact:
    name: Quantum Shield Team
    url: https://quantum-shield.io
  license:
    name: Proprietary

servers:
  - url: https://api.quantum-shield.io/v1
    description: Production
  - url: https://api-staging.quantum-shield.io/v1
    description: Staging
  - url: http://localhost:3001/v1
    description: Development

tags:
  - name: Health
    description: Health check endpoints
  - name: Auth
    description: Authentication (SIWE/JWT)
  - name: Lock
    description: Lock API (Sequence #1)
  - name: Unlock
    description: Unlock API (Sequence #2, #3)
  - name: Challenge
    description: Challenge API (Sequence #4)
  - name: Prover
    description: Prover Portal API
  - name: Observer
    description: Observer Portal API
  - name: Governance
    description: Governance API
  - name: TokenHub
    description: Token Hub (veQS) API
  - name: Explorer
    description: Public Explorer API
  - name: Admin
    description: QS Admin API

paths:
  # ==========================================================================
  # Health Check
  # ==========================================================================
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  # ==========================================================================
  # Authentication (TASK-P5-012)
  # ==========================================================================
  /auth/siwe:
    post:
      tags: [Auth]
      summary: Authenticate with SIWE (Dilithium-III signature)
      operationId: siweAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SiweRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiweResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user info
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================================================
  # Lock API (Sequence #1)
  # ==========================================================================
  /lock:
    post:
      tags: [Lock]
      summary: Create a new lock
      description: |
        Lock assets for cross-chain transfer.

        ## Sequence #1: Lock
        1. Validate ML-DSA-65 signature (NIST FIPS 204)
        2. Check nonce uniqueness
        3. Check expiry
        4. Compute SR_0 using SHA3-256
        5. Generate lock_id
        6. Store lock record
        7. Notify Event Bridge

      operationId: createLock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LockRequest'
      responses:
        '200':
          description: Lock created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LockResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================================================
  # Unlock API (Sequence #2, #3)
  # ==========================================================================
  /unlock:
    post:
      tags: [Unlock]
      summary: Create normal unlock request (24h time lock)
      description: |
        ## Sequence #2: Normal Unlock
        1. Validate ML-DSA-65 signature
        2. Verify lock ownership
        3. Compute SR_1 using SHA3-256
        4. Request VRF for prover selection
        5. Wait for 2-of-5 SPHINCS+ signatures
        6. Start 24-hour time lock

      operationId: createUnlock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnlockRequest'
      responses:
        '200':
          description: Unlock request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnlockResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /unlock/emergency:
    post:
      tags: [Unlock]
      summary: Create emergency unlock request (7-day time lock)
      description: |
        ## Sequence #3: Emergency Unlock
        - 7-day time lock (not 24h)
        - Bond required: MAX(0.1 ETH, amount × 5%)
        - Bond returned after time lock expires

      operationId: createEmergencyUnlock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnlockRequest'
      responses:
        '200':
          description: Emergency unlock request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmergencyUnlockResponse'

  # ==========================================================================
  # Status API
  # ==========================================================================
  /status/{lock_id}:
    get:
      tags: [Lock]
      summary: Get lock status
      operationId: getLockStatus
      parameters:
        - name: lock_id
          in: path
          required: true
          schema:
            type: string
            pattern: '^0x[a-fA-F0-9]{64}$'
      responses:
        '200':
          description: Lock status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /status/pending:
    get:
      tags: [Unlock]
      summary: Get pending unlocks
      operationId: getPendingUnlocks
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of pending unlocks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendingUnlocksResponse'

  # ==========================================================================
  # Challenge API (Sequence #4)
  # ==========================================================================
  /challenge:
    post:
      tags: [Challenge]
      summary: Submit a challenge
      description: |
        ## Sequence #4: Challenge + Slashing
        - Bond required: MAX(0.1 ETH, amount × 1%)
        - Defense period: 48 hours
        - Quadratic slashing: N² × 10%
        - Distribution: 60% Challenger, 20% Insurance, 20% Burn

      operationId: submitChallenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChallengeRequest'
      responses:
        '200':
          description: Challenge submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeResponse'

  /challenge/{lock_id}:
    get:
      tags: [Challenge]
      summary: Get challenge info
      operationId: getChallenge
      parameters:
        - name: lock_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Challenge info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeInfo'
        '404':
          $ref: '#/components/responses/NotFound'

  /challenge/{lock_id}/defense:
    post:
      tags: [Challenge]
      summary: Submit defense (Prover only)
      operationId: submitDefense
      parameters:
        - name: lock_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DefenseRequest'
      responses:
        '200':
          description: Defense submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefenseResponse'

  /challenge/{lock_id}/auto-resolve:
    post:
      tags: [Challenge]
      summary: Auto-resolve challenge after deadline
      operationId: autoResolve
      parameters:
        - name: lock_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Challenge resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoResolveResponse'

  # ==========================================================================
  # Prover API (Sequence #5, #6)
  # ==========================================================================
  /prover/register:
    post:
      tags: [Prover]
      summary: Register as a prover
      operationId: registerProver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProverRegisterRequest'
      responses:
        '200':
          description: Prover registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProverRegisterResponse'

  /prover/{prover_id}:
    get:
      tags: [Prover]
      summary: Get prover info
      operationId: getProverInfo
      parameters:
        - name: prover_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Prover info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProverInfoResponse'

  /prover/{prover_id}/dashboard:
    get:
      tags: [Prover]
      summary: Get prover dashboard
      operationId: getProverDashboard
      parameters:
        - name: prover_id
          in: path
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Prover dashboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProverDashboard'

  /prover/{prover_id}/queue:
    get:
      tags: [Prover]
      summary: Get signing queue
      operationId: getSigningQueue
      parameters:
        - name: prover_id
          in: path
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Signing queue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SigningQueueResponse'

  /prover/{prover_id}/sign:
    post:
      tags: [Prover]
      summary: Submit SPHINCS+ signature
      operationId: submitSignature
      parameters:
        - name: prover_id
          in: path
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProverSignRequest'
      responses:
        '200':
          description: Signature submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProverSignResponse'

  /prover/{prover_id}/exit:
    post:
      tags: [Prover]
      summary: Initiate prover exit (7-day unbonding)
      operationId: initiateProverExit
      parameters:
        - name: prover_id
          in: path
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Exit initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProverExitResponse'

  /prover/{prover_id}/withdraw:
    post:
      tags: [Prover]
      summary: Withdraw stake after unbonding
      operationId: withdrawStake
      parameters:
        - name: prover_id
          in: path
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProverWithdrawRequest'
      responses:
        '200':
          description: Withdrawal successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProverWithdrawResponse'

  # ==========================================================================
  # Observer API
  # ==========================================================================
  /observer/dashboard:
    get:
      tags: [Observer]
      summary: Get observer dashboard
      operationId: getObserverDashboard
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Observer dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObserverDashboard'

  /observer/pending-unlocks:
    get:
      tags: [Observer]
      summary: Get pending unlocks for monitoring
      operationId: getObserverPendingUnlocks
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          schema:
            type: string
            enum: [amount_desc, amount_asc, release_time_asc, release_time_desc]
      responses:
        '200':
          description: Pending unlocks list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObserverPendingUnlocksResponse'

  /observer/suspicious-txs:
    get:
      tags: [Observer]
      summary: Get suspicious transactions
      operationId: getSuspiciousTxs
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Suspicious transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuspiciousTxsResponse'

  /observer/challenge:
    post:
      tags: [Observer]
      summary: Submit challenge as observer
      operationId: submitObserverChallenge
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObserverChallengeRequest'
      responses:
        '200':
          description: Challenge submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObserverChallengeResponse'

  /observer/earnings:
    get:
      tags: [Observer]
      summary: Get observer earnings
      operationId: getObserverEarnings
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Earnings data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObserverEarningsResponse'

  /observer/claim-earnings:
    post:
      tags: [Observer]
      summary: Claim observer earnings
      operationId: claimObserverEarnings
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Earnings claimed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimEarningsResponse'

  # ==========================================================================
  # Token Hub API (veQS)
  # ==========================================================================
  /token-hub/dashboard:
    get:
      tags: [TokenHub]
      summary: Get Token Hub dashboard
      operationId: getTokenHubDashboard
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Token Hub dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenHubDashboard'

  /token-hub/lock:
    post:
      tags: [TokenHub]
      summary: Lock QS tokens for veQS
      operationId: createVeqsLock
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VeqsLockRequest'
      responses:
        '200':
          description: Lock created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VeqsLockResponse'

  /token-hub/delegates:
    get:
      tags: [TokenHub]
      summary: Get available delegates
      operationId: getDelegates
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [veqs, participation, delegators]
      responses:
        '200':
          description: Delegates list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DelegatesResponse'

  /token-hub/delegate:
    post:
      tags: [TokenHub]
      summary: Delegate voting power
      operationId: delegatePower
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DelegateRequest'
      responses:
        '200':
          description: Delegation successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DelegateResponse'

  /token-hub/rewards:
    get:
      tags: [TokenHub]
      summary: Get rewards info
      operationId: getRewards
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Rewards info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenHubRewardsResponse'

  /token-hub/claim:
    post:
      tags: [TokenHub]
      summary: Claim rewards
      operationId: claimRewards
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Rewards claimed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimRewardsResponse'

  # ==========================================================================
  # Governance API
  # ==========================================================================
  /governance/dashboard:
    get:
      tags: [Governance]
      summary: Get governance dashboard
      operationId: getGovernanceDashboard
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Governance dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceDashboard'

  /governance/proposals:
    get:
      tags: [Governance]
      summary: List proposals
      operationId: listProposals
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, pending, passed, rejected, all]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Proposals list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalsResponse'

    post:
      tags: [Governance]
      summary: Create proposal
      operationId: createProposal
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProposalRequest'
      responses:
        '200':
          description: Proposal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Proposal'

  /governance/proposals/{id}:
    get:
      tags: [Governance]
      summary: Get proposal detail
      operationId: getProposal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Proposal detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalDetail'

  /governance/vote:
    post:
      tags: [Governance]
      summary: Submit vote
      operationId: submitVote
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoteRequest'
      responses:
        '200':
          description: Vote submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoteResponse'

  # ==========================================================================
  # Explorer API (Public)
  # ==========================================================================
  /explorer/overview:
    get:
      tags: [Explorer]
      summary: Get explorer overview statistics
      operationId: getExplorerOverview
      responses:
        '200':
          description: Overview statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExplorerOverview'

  /explorer/search:
    get:
      tags: [Explorer]
      summary: Search locks, unlocks, addresses
      operationId: explorerSearch
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 3
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResults'

  /explorer/locks:
    get:
      tags: [Explorer]
      summary: List all locks
      operationId: getExplorerLocks
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [all, active, released, challenged]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Locks list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExplorerLocksResponse'

  /explorer/locks/{id}:
    get:
      tags: [Explorer]
      summary: Get lock detail
      operationId: getExplorerLockDetail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lock detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExplorerLockDetail'

  /explorer/analytics:
    get:
      tags: [Explorer]
      summary: Get analytics data
      operationId: getExplorerAnalytics
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [24h, 7d, 30d, all]
            default: 7d
      responses:
        '200':
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExplorerAnalytics'

# ==========================================================================
# Components
# ==========================================================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    # ========================================================================
    # Common Schemas
    # ========================================================================
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required: [code, message]

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version:
          type: string
        timestamp:
          type: integer
          format: int64

    # ========================================================================
    # Auth Schemas
    # ========================================================================
    SiweRequest:
      type: object
      properties:
        message:
          type: string
          description: SIWE message (EIP-4361)
        signature:
          type: string
          description: ML-DSA-65 signature (hex)
        public_key:
          type: string
          description: Dilithium-III public key (hex)
      required: [message, signature, public_key]

    SiweResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: integer
          format: int64
        address:
          type: string

    RefreshTokenRequest:
      type: object
      properties:
        refresh_token:
          type: string
      required: [refresh_token]

    RefreshTokenResponse:
      type: object
      properties:
        access_token:
          type: string
        expires_at:
          type: integer
          format: int64

    UserInfoResponse:
      type: object
      properties:
        address:
          type: string
        public_key_hash:
          type: string
        issued_at:
          type: integer
          format: int64
        expires_at:
          type: integer
          format: int64

    # ========================================================================
    # Lock Schemas
    # ========================================================================
    LockRequest:
      type: object
      properties:
        chain_id:
          type: integer
          format: int64
          description: Destination chain ID
        asset:
          type: string
          description: ERC20 asset address
        amount:
          type: string
          description: Amount in wei
