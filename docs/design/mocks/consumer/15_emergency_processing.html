<!--
## Interactions Defined
| Element | Action | Target |
|---------|--------|--------|
| Auto redirect | onComplete | 16_emergency_success.html |

## CDO-1: ローディングアニメーション統一
処理画面の統一仕様:
- 総処理時間: 5000ms (5秒)
- step間隔: 均等配分
- アニメーションCSS: 共通定義使用
-->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Shield - 緊急Unlock処理中</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0c;
            --warning: #f0a030;
            --warning-dim: rgba(240, 160, 48, 0.15);
            --success: #00c896;
            --text-primary: #f8f8fa;
            --text-secondary: #9898a0;
            --text-tertiary: #606068;
            --font-body: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
            --radius-lg: 14px;
            /* CDO-1: アニメーション統一定義 */
            --animation-duration-orbit: 1.5s;
            --animation-duration-orbit-reverse: 2s;
            --animation-duration-pulse: 1.5s;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body); background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .premium-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .warning-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 600px; background: radial-gradient(circle, var(--warning-dim), transparent 60%); }
        .container { position: relative; z-index: 1; text-align: center; padding: 24px; max-width: 400px; }

        .processing-visual { margin-bottom: 32px; position: relative; width: 160px; height: 160px; margin: 0 auto 32px; }
        .warning-icon { position: absolute; inset: 30px; display: flex; align-items: center; justify-content: center; font-size: 48px; animation: pulse var(--animation-duration-pulse) ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } }
        .orbit { position: absolute; inset: 0; border: 2px solid transparent; border-top-color: var(--warning); border-radius: 50%; animation: spin var(--animation-duration-orbit) linear infinite; }
        .orbit-2 { inset: -10px; animation-duration: var(--animation-duration-orbit-reverse); animation-direction: reverse; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .title { font-size: 24px; font-weight: 700; margin-bottom: 12px; color: var(--warning); }
        .subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 32px; }

        .steps { text-align: left; margin-bottom: 32px; }
        .step { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: rgba(255,255,255,0.02); border-radius: var(--radius-lg); margin-bottom: 8px; transition: all 0.3s; }
        .step.active { background: var(--warning-dim); }
        .step.complete { background: rgba(0, 200, 150, 0.1); }
        .step-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 14px; }
        .step.pending .step-icon { background: rgba(255,255,255,0.05); color: var(--text-tertiary); }
        .step.active .step-icon { background: var(--warning); color: var(--bg-primary); animation: step-pulse 1s ease-in-out infinite; }
        .step.complete .step-icon { background: var(--success); color: white; }
        @keyframes step-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .step-text { flex: 1; font-size: 14px; }
        .step.pending .step-text { color: var(--text-tertiary); }
        .step.active .step-text { color: var(--text-primary); font-weight: 500; }
        .step.complete .step-text { color: var(--success); }
    </style>
</head>
<body>
    <div class="premium-bg"><div class="warning-glow"></div></div>

    <div class="container">
        <div class="processing-visual">
            <div class="orbit"></div>
            <div class="orbit orbit-2"></div>
            <div class="warning-icon">⚠️</div>
        </div>

        <h1 class="title">緊急Unlock処理中...</h1>
        <p class="subtitle">Bond支払いを処理しています</p>

        <div class="steps">
            <div class="step complete" id="step1">
                <div class="step-icon">✓</div>
                <span class="step-text">ウォレット署名を検証</span>
            </div>
            <div class="step active" id="step2">
                <div class="step-icon">2</div>
                <span class="step-text">Bond (0.50 ETH) を送金中...</span>
            </div>
            <div class="step pending" id="step3">
                <div class="step-icon">3</div>
                <span class="step-text">緊急Unlock要求を登録</span>
            </div>
            <div class="step pending" id="step4">
                <div class="step-icon">4</div>
                <span class="step-text">7日間Time Lock開始</span>
            </div>
        </div>
    </div>

    <script>
        // CDO-1: 処理画面タイミング統一
        // 総処理時間: 5000ms
        // step間隔: 均等配分 (1000ms each for remaining steps)
        const TOTAL_DURATION = 5000;
        const STEP_INTERVAL = 1000;

        // step2完了: 1000ms後
        setTimeout(() => {
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step2').classList.add('complete');
            document.getElementById('step2').querySelector('.step-icon').textContent = '✓';
            document.getElementById('step3').classList.remove('pending');
            document.getElementById('step3').classList.add('active');
        }, STEP_INTERVAL);

        // step3完了: 2000ms後
        setTimeout(() => {
            document.getElementById('step3').classList.remove('active');
            document.getElementById('step3').classList.add('complete');
            document.getElementById('step3').querySelector('.step-icon').textContent = '✓';
            document.getElementById('step4').classList.remove('pending');
            document.getElementById('step4').classList.add('active');
        }, STEP_INTERVAL * 2);

        // step4完了: 3000ms後
        setTimeout(() => {
            document.getElementById('step4').classList.remove('active');
            document.getElementById('step4').classList.add('complete');
            document.getElementById('step4').querySelector('.step-icon').textContent = '✓';
        }, STEP_INTERVAL * 3);

        // リダイレクト: 5000ms後
        setTimeout(() => {
            window.location.href = '16_emergency_success.html';
        }, TOTAL_DURATION);
    </script>
</body>
</html>
