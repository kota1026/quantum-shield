<!DOCTYPE html>

    <style>
        :root{--bg-primary:#0a0a0c;--bg-secondary:#111114;--bg-card:#0e0e11;--bg-sidebar:#0c0c0f;--accent-hinomaru:#bc002d;--accent-hinomaru-dim:rgba(188,0,45,0.12);--accent-gold:#c9a962;--accent-gold-dim:rgba(201,169,98,0.1);--success:#00c896;--text-primary:#f8f8fa;--text-secondary:#9898a0;--text-tertiary:#606068;--border-subtle:rgba(255,255,255,0.04);--border-default:rgba(255,255,255,0.08);--font-body:'Plus Jakarta Sans',sans-serif;--font-mono:'DM Mono',monospace;--radius-md:10px;--radius-lg:14px;--radius-xl:20px;--space-sm:8px;--space-md:16px;--space-lg:24px;--space-xl:32px}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font-body);background:var(--bg-primary);color:var(--text-primary);min-height:100vh;display:flex}a{color:inherit;text-decoration:none}
        .sidebar{width:260px;background:var(--bg-sidebar);border-right:1px solid var(--border-subtle);position:fixed;top:0;left:0;bottom:0;padding:var(--space-lg)}
        .logo{display:flex;align-items:center;gap:var(--space-md);margin-bottom:var(--space-xl)}.logo-icon{width:40px;height:40px;background:var(--accent-hinomaru);border-radius:50%}.logo-text{font-size:16px;font-weight:600}
        .nav-item{display:flex;align-items:center;gap:var(--space-md);padding:var(--space-sm) var(--space-md);border-radius:var(--radius-md);font-size:14px;color:var(--text-secondary);margin-bottom:4px}.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text-primary)}.nav-item.active{background:var(--accent-hinomaru-dim);color:#e8334d}
        .main-content{flex:1;margin-left:260px}.top-bar{padding:var(--space-md) var(--space-xl);background:var(--bg-secondary);border-bottom:1px solid var(--border-subtle)}.page-title{font-size:20px;font-weight:600}
        .page-content{padding:var(--space-xl)}
        .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-md);margin-bottom:var(--space-xl)}
        .stat-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:var(--space-lg)}.stat-label{font-size:12px;color:var(--text-tertiary);margin-bottom:4px}.stat-value{font-size:24px;font-weight:700}.stat-change{font-size:12px;color:var(--success);margin-top:4px}
        .card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-xl);margin-bottom:var(--space-xl)}.card-header{padding:var(--space-lg);border-bottom:1px solid var(--border-subtle)}.card-title{font-size:16px;font-weight:600}.card-body{padding:var(--space-lg)}
        .chart-placeholder{height:250px;background:var(--bg-secondary);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--text-tertiary)}
    </style>
</head>

        </div>
    </main>
</body>
</html>
