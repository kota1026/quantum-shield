<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg-primary:#0a0a0c;--bg-secondary:#111114;--bg-card:#0e0e11;--bg-sidebar:#0c0c0f;--accent-hinomaru:#bc002d;--accent-hinomaru-dim:rgba(188,0,45,0.12);--accent-gold:#c9a962;--text-primary:#f8f8fa;--text-secondary:#9898a0;--text-tertiary:#606068;--border-subtle:rgba(255,255,255,0.04);--border-default:rgba(255,255,255,0.08);--font-body:'Plus Jakarta Sans',sans-serif;--radius-md:10px;--radius-lg:14px;--radius-xl:20px;--space-sm:8px;--space-md:16px;--space-lg:24px;--space-xl:32px}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font-body);background:var(--bg-primary);color:var(--text-primary);min-height:100vh;display:flex}a{color:inherit;text-decoration:none}
        .sidebar{width:260px;background:var(--bg-sidebar);border-right:1px solid var(--border-subtle);position:fixed;top:0;left:0;bottom:0;padding:var(--space-lg)}
        .logo{display:flex;align-items:center;gap:var(--space-md);margin-bottom:var(--space-xl)}.logo-icon{width:40px;height:40px;background:var(--accent-hinomaru);border-radius:50%}.logo-text{font-size:16px;font-weight:600}
        .nav-item{display:flex;align-items:center;gap:var(--space-md);padding:var(--space-sm) var(--space-md);border-radius:var(--radius-md);font-size:14px;color:var(--text-secondary);margin-bottom:4px}.nav-item:hover{background:rgba(255,255,255,0.04)}.nav-item.active{background:var(--accent-hinomaru-dim);color:#e8334d}
        .main-content{flex:1;margin-left:260px}.top-bar{display:flex;align-items:center;gap:var(--space-md);padding:var(--space-md) var(--space-xl);background:var(--bg-secondary);border-bottom:1px solid var(--border-subtle)}
        .back-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.04);border:1px solid var(--border-subtle);border-radius:var(--radius-md);cursor:pointer;color:var(--text-secondary)}
        .page-title{font-size:20px;font-weight:600}
        .page-content{padding:var(--space-xl);max-width:600px}
        .card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-xl);margin-bottom:var(--space-lg)}.card-header{padding:var(--space-lg);border-bottom:1px solid var(--border-subtle)}.card-title{font-size:16px;font-weight:600}.card-body{padding:var(--space-lg)}
        .form-group{margin-bottom:var(--space-lg)}.form-label{display:block;font-size:13px;font-weight:500;margin-bottom:var(--space-sm)}
        .form-input,.form-select{width:100%;padding:var(--space-md);background:var(--bg-secondary);border:1px solid var(--border-default);border-radius:var(--radius-md);color:var(--text-primary);font-size:14px}
        .email-list{display:flex;flex-direction:column;gap:var(--space-sm)}
        .email-row{display:flex;gap:var(--space-sm)}.email-row .form-input{flex:1}
        .btn{display:inline-flex;align-items:center;gap:var(--space-sm);padding:var(--space-md) var(--space-lg);border-radius:var(--radius-md);font-size:14px;font-weight:600;cursor:pointer;border:none}
        .btn-ghost{background:transparent;color:var(--text-secondary);border:1px dashed var(--border-default)}.btn-ghost:hover{border-color:var(--text-secondary)}
        .btn-primary{background:var(--accent-hinomaru);color:white;width:100%}
        .pending-invites{margin-top:var(--space-xl)}
        .invite-item{display:flex;justify-content:space-between;align-items:center;padding:var(--space-md);background:var(--bg-secondary);border-radius:var(--radius-md);margin-bottom:var(--space-sm)}
        .invite-email{font-size:14px}.invite-status{font-size:12px;color:var(--accent-gold)}
        .invite-actions{display:flex;gap:var(--space-sm)}.invite-btn{padding:6px 12px;background:rgba(255,255,255,0.04);border:none;border-radius:var(--radius-md);font-size:12px;color:var(--text-secondary);cursor:pointer}
    </style>

<body>
    <aside class="sidebar">
        <div class="logo"><div class="logo-icon"></div><div class="logo-text">Quantum Shield</div></div>
        <a href="01_overview_dashboard.html" class="nav-item">📊 Overview</a>
        <a href="05_transaction_list.html" class="nav-item">📋 Transactions</a>
        <a href="09_user_list.html" class="nav-item active">👥 Users</a>
        <a href="18_org_settings.html" class="nav-item">⚙️ Settings</a>

    <main class="main-content">
        <header class="top-bar">
            <a href="09_user_list.html" class="back-btn" id="btn-back">←</a>
            <h1 class="page-title">Invite Users</h1>
        </header>
        <div class="page-content">
            <div class="card">
                <div class="card-header"><h2 class="card-title">Send Invitations</h2></div>
                <div class="card-body">
                    <div class="form-group">
                        <label class="form-label">Email Addresses</label>
                        <div class="email-list">
                            <div class="email-row"><input type="email" class="form-input" placeholder="user@company.com"></div>
                            <div class="email-row"><input type="email" class="form-input" placeholder="user@company.com"></div>
                        </div>
                        <button class="btn btn-ghost" id="btn-add-email" style="margin-top:var(--space-sm);width:100%">+ Add another email</button>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Default Role</label>
                        <select class="form-select">
                            <option>Member</option>
                            <option>Admin</option>
                            <option>Viewer</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" id="btn-send">📧 Send Invitations</button>
                </div>
            </div>
            <div class="pending-invites">
                <h3 style="font-size:16px;margin-bottom:var(--space-md)">Pending Invitations</h3>
                <div class="invite-item">
                    <div><div class="invite-email">alice@company.com</div><div class="invite-status">Sent 2 hours ago</div></div>
                    <div class="invite-actions"><button class="invite-btn">Resend</button><button class="invite-btn">Cancel</button></div>
                </div>
                <div class="invite-item">
                    <div><div class="invite-email">bob@company.com</div><div class="invite-status">Sent 1 day ago</div></div>
                    <div class="invite-actions"><button class="invite-btn">Resend</button><button class="invite-btn">Cancel</button></div>
                </div>
            </div>
        </div>
    </main>
