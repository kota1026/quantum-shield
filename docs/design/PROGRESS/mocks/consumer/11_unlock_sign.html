<!--
## Interactions Defined
| Element | Action | Target |
|---------|--------|--------|
| .back-btn | click | 04_unlock.html |
| #signBtn | click | 12_unlock_processing.html |
| #cancelBtn | click | 04_unlock.html |
-->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Shield - Dilithium署名</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-primary: #0a0a0c; --bg-secondary: #111114; --bg-card: #0e0e11; --accent-hinomaru: #bc002d; --accent-hinomaru-light: #e8334d; --accent-hinomaru-dim: rgba(188, 0, 45, 0.12); --accent-hinomaru-glow: rgba(188, 0, 45, 0.4); --accent-gold: #c9a962; --accent-gold-dim: rgba(201, 169, 98, 0.1); --text-primary: #f8f8fa; --text-secondary: #9898a0; --text-tertiary: #606068; --border-subtle: rgba(255, 255, 255, 0.04); --border-default: rgba(255, 255, 255, 0.08); --font-body: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; --radius-md: 10px; --radius-lg: 14px; --radius-xl: 20px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body); background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .premium-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .red-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 600px; background: radial-gradient(circle, var(--accent-hinomaru-dim), transparent 60%); opacity: 0.4; }
        .container { position: relative; z-index: 1; max-width: 480px; width: 100%; padding: 24px; }
        .header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
        .back-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--bg-secondary); border: 1px solid var(--border-default); border-radius: var(--radius-md); color: var(--text-secondary); text-decoration: none; font-size: 18px; transition: all 0.2s; }
        .back-btn:hover { border-color: var(--accent-hinomaru); color: var(--accent-hinomaru-light); }
        .header-title { font-size: 20px; font-weight: 700; }
        .sign-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); padding: 32px; text-align: center; }
        .sign-icon { font-size: 64px; margin-bottom: 24px; }
        .sign-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .sign-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 32px; }
        .unlock-summary { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 24px; text-align: left; }
        .summary-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-subtle); }
        .summary-row:last-child { border-bottom: none; }
        .summary-label { font-size: 13px; color: var(--text-tertiary); }
        .summary-value { font-size: 14px; font-weight: 500; }
        .summary-value.highlight { color: var(--accent-gold); font-size: 18px; }
        .sign-visual { margin: 32px 0; position: relative; height: 120px; display: flex; align-items: center; justify-content: center; }
        .key-icon { width: 80px; height: 80px; background: var(--accent-hinomaru-dim); border: 2px solid var(--accent-hinomaru); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; animation: key-pulse 2s ease-in-out infinite; }
        @keyframes key-pulse { 0%, 100% { box-shadow: 0 0 0 0 var(--accent-hinomaru-glow); } 50% { box-shadow: 0 0 0 20px transparent; } }
        .sign-info { background: var(--accent-gold-dim); border: 1px solid var(--accent-gold); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 24px; text-align: left; }
        .sign-info p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
        .sign-info strong { color: var(--accent-gold); }
        .buttons { display: flex; gap: 12px; }
        .btn { flex: 1; padding: 16px; border-radius: var(--radius-lg); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, var(--accent-hinomaru), var(--accent-hinomaru-light)); border: none; color: white; }
        .btn-primary:hover { box-shadow: 0 8px 24px var(--accent-hinomaru-glow); transform: translateY(-2px); }
        .btn-secondary { background: var(--bg-secondary); border: 1px solid var(--border-default); color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="premium-bg"><div class="red-glow"></div></div>
    <div class="container">
        <div class="header">
            <a href="04_unlock.html" class="back-btn">←</a>
            <h1 class="header-title">Dilithium署名</h1>
        </div>
        <div class="sign-card">
            <div class="sign-icon">🔐</div>
            <h2 class="sign-title">署名が必要です</h2>
            <p class="sign-subtitle">Unlock要求を承認するためにDilithium署名を行います</p>
            <div class="unlock-summary">
                <div class="summary-row"><span class="summary-label">Unlock金額</span><span class="summary-value highlight">10.00 ETH</span></div>
                <div class="summary-row"><span class="summary-label">Unlockタイプ</span><span class="summary-value">通常Unlock</span></div>
                <div class="summary-row"><span class="summary-label">待機時間</span><span class="summary-value">24時間</span></div>
                <div class="summary-row"><span class="summary-label">ガス代（概算）</span><span class="summary-value">~0.003 ETH</span></div>
            </div>
            <div class="sign-visual"><div class="key-icon">🔑</div></div>
            <div class="sign-info"><p><strong>Dilithium-III署名</strong>を使用してUnlock要求を承認します。この署名は量子コンピュータに対しても安全です。</p></div>
            <div class="buttons">
                <a href="04_unlock.html" class="btn btn-secondary" id="cancelBtn">キャンセル</a>
                <button class="btn btn-primary" id="signBtn" onclick="submitSign()">署名してUnlock</button>
            </div>
        </div>
    </div>
    <script>
        function submitSign() {
            document.getElementById('signBtn').textContent = '署名中...';
            document.getElementById('signBtn').disabled = true;
            setTimeout(() => { window.location.href = '12_unlock_processing.html'; }, 1500);
        }
    </script>
</body>
</html>
