<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Shield - Sequence Diagram Animation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --red:#C41E3A;--gold:#D4AF37;--green:#22C55E;--blue:#3B82F6;
    --purple:#8B5CF6;--orange:#F59E0B;--cyan:#06B6D4;
    --dark:#0A0A14;--dark-card:#12121F;--dark-mid:#1A1A2E;
    --dark-border:#2A2A42;--text:#E8E8F0;--text-muted:#8888A0;
    --mono:'JetBrains Mono',monospace;
  }
  html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);font-family:'Inter',sans-serif;color:var(--text)}

  .container{display:flex;flex-direction:column;height:100vh}

  /* Top Bar */
  .top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--dark-card);border-bottom:1px solid var(--dark-border);flex-shrink:0}
  .top-logo{font-size:14px;font-weight:800;color:var(--red)}
  .top-title{font-size:14px;font-weight:600;color:var(--text-muted)}

  /* Tabs */
  .tabs{display:flex;gap:2px;padding:8px 24px;background:var(--dark-card);border-bottom:1px solid var(--dark-border);overflow-x:auto;flex-shrink:0}
  .tab{background:none;border:1px solid transparent;color:var(--text-muted);font-size:12px;font-weight:600;padding:8px 16px;border-radius:6px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:6px}
  .tab:hover{border-color:var(--dark-border);color:var(--text)}
  .tab.active{background:var(--red);color:#fff;border-color:var(--red)}
  .tab .tn{font-size:10px;font-weight:800;width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.15)}

  /* Main */
  .main{flex:1;display:flex;overflow:hidden}

  /* Sequence Canvas */
  .seq-canvas{flex:1;position:relative;overflow:hidden}

  /* Lifeline Header Row */
  .ll-row{display:flex;padding:20px 40px 0;position:relative;z-index:2;flex-shrink:0}
  .ll-col{flex:1;display:flex;justify-content:center}
  .ll-head{padding:10px 16px;border-radius:8px;border:2px solid;font-size:13px;font-weight:700;text-align:center;white-space:nowrap;min-width:90px}
  .ll-head.user{border-color:#888;background:rgba(136,136,136,.1);color:#aaa}
  .ll-head.fe{border-color:var(--blue);background:rgba(59,130,246,.1);color:var(--blue)}
  .ll-head.api{border-color:var(--green);background:rgba(34,197,94,.1);color:var(--green)}
  .ll-head.db{border-color:var(--purple);background:rgba(139,92,246,.1);color:var(--purple)}
  .ll-head.l1{border-color:var(--red);background:rgba(196,30,58,.1);color:var(--red)}
  .ll-head.l3{border-color:var(--gold);background:rgba(212,175,55,.1);color:var(--gold)}
  .ll-head.vrf{border-color:var(--orange);background:rgba(245,158,11,.1);color:var(--orange)}

  /* Vertical dashed lines */
  .ll-lines{position:absolute;top:56px;bottom:0;left:40px;right:40px;display:flex;pointer-events:none;z-index:0}
  .ll-vline{flex:1;display:flex;justify-content:center}
  .ll-vline::after{content:'';width:2px;height:100%;background:repeating-linear-gradient(to bottom,var(--dark-border) 0 6px,transparent 6px 12px)}

  /* Messages area */
  .msg-area{flex:1;position:relative;overflow-y:auto;padding:12px 40px 80px;z-index:1}

  .msg-row{height:48px;display:flex;align-items:center;position:relative;opacity:0;transform:translateY(6px);transition:all .4s ease}
  .msg-row.visible{opacity:1;transform:translateY(0)}

  /* Arrow */
  .arrow-wrap{position:absolute;display:flex;align-items:center;height:2px}
  .arrow-line{flex:1;height:2px;background:var(--text-muted);transform:scaleX(0);transform-origin:left;transition:transform .4s ease}
  .msg-row.visible .arrow-line{transform:scaleX(1)}
  .arrow-line.rtl{transform-origin:right}
  .arrowhead{width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;opacity:0;transition:opacity .2s ease .35s}
  .msg-row.visible .arrowhead{opacity:1}
  .arrowhead.right{border-left:8px solid var(--text-muted)}
  .arrowhead.left{border-right:8px solid var(--text-muted)}

  /* Self arrow */
  .self-arrow{position:absolute;width:36px;height:28px;border:2px solid var(--text-muted);border-left:none;border-radius:0 8px 8px 0;opacity:0;transition:opacity .4s}
  .msg-row.visible .self-arrow{opacity:1}

  /* Label */
  .msg-label{position:absolute;font-size:11px;font-family:var(--mono);white-space:nowrap;top:-14px;opacity:0;transition:opacity .3s ease .2s}
  .msg-row.visible .msg-label{opacity:1}

  /* Description Panel */
  .desc-panel{width:280px;border-left:1px solid var(--dark-border);background:var(--dark-card);padding:20px;overflow-y:auto;flex-shrink:0}
  .desc-title{font-size:16px;font-weight:800;margin-bottom:4px}
  .desc-sub{font-size:12px;color:var(--text-muted);margin-bottom:16px}
  .ds{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--dark-border);opacity:.35;transition:opacity .3s}
  .ds.active{opacity:1}
  .ds.done{opacity:.6}
  .ds-dot{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;background:var(--dark);border:1px solid var(--dark-border);color:var(--text-muted)}
  .ds.active .ds-dot{background:var(--red);border-color:var(--red);color:#fff}
  .ds.done .ds-dot{background:rgba(34,197,94,.15);border-color:var(--green);color:var(--green)}
  .ds-text{font-size:12px;color:var(--text-muted);line-height:1.4}
  .ds.active .ds-text{color:var(--text)}
  .ds-tech{font-size:10px;font-family:var(--mono);color:var(--gold);margin-top:2px}

  /* Controls */
  .controls{display:flex;align-items:center;gap:16px;padding:12px 24px;background:var(--dark-card);border-top:1px solid var(--dark-border);flex-shrink:0}
  .cb{background:var(--dark-mid);border:1px solid var(--dark-border);color:var(--text);font-size:18px;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;transition:all .2s;min-width:44px;height:40px;display:flex;align-items:center;justify-content:center}
  .cb:hover{border-color:var(--red)}
  .cb.primary{background:var(--red);border-color:var(--red);color:#fff;font-weight:700;padding:8px 24px;font-size:14px}
  .pbar{flex:1;height:6px;background:var(--dark-mid);border-radius:3px;overflow:hidden}
  .pfill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:3px;transition:width .3s}
  .slbl{font-size:12px;font-family:var(--mono);color:var(--text-muted);min-width:70px;text-align:right}
  .spd{display:flex;gap:2px;background:var(--dark);border-radius:6px;padding:2px}
  .sb{background:none;border:none;color:var(--text-muted);font-size:11px;font-weight:600;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:var(--mono);transition:all .2s}
  .sb.active{background:var(--dark-border);color:var(--text)}
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <div class="top-logo">QUANTUM SHIELD</div>
    <div class="top-title">Protocol Sequence Diagrams</div>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-seq="lock"><span class="tn">1</span>Consumer Lock</button>
    <button class="tab" data-seq="unlock"><span class="tn">2</span>Normal Unlock</button>
    <button class="tab" data-seq="emergency"><span class="tn">3</span>Emergency Unlock</button>
    <button class="tab" data-seq="prover"><span class="tn">4</span>Prover Registration</button>
    <button class="tab" data-seq="challenge"><span class="tn">5</span>Observer Challenge</button>
    <button class="tab" data-seq="governance"><span class="tn">6</span>Governance</button>
  </div>
  <div class="main">
    <div class="seq-canvas" id="canvas"></div>
    <div class="desc-panel" id="desc"></div>
  </div>
  <div class="controls">
    <button class="cb" onclick="resetSeq()" title="Reset">&#8634;</button>
    <button class="cb primary" id="playBtn" onclick="togglePlay()">&#9654; Play</button>
    <button class="cb" onclick="stepFwd()" title="Next step">&#9197;</button>
    <div class="pbar"><div class="pfill" id="pfill" style="width:0"></div></div>
    <span class="slbl" id="slbl">0 / 0</span>
    <div class="spd">
      <button class="sb" data-s="2000" onclick="setSpd(this)">0.5x</button>
      <button class="sb active" data-s="1000" onclick="setSpd(this)">1x</button>
      <button class="sb" data-s="500" onclick="setSpd(this)">2x</button>
    </div>
  </div>
</div>

let curSeq='lock',curStep=-1,playing=false,timer=null,spd=1000;

function render(key){
  const s=SEQ[key],cv=document.getElementById('canvas'),dp=document.getElementById('desc');
  // Header
  let h='<div class="ll-row">';
  s.ll.forEach(l=>{h+=`<div class="ll-col"><div class="ll-head ${l.t}">${l.l}</div></div>`});
  h+='</div>';
  // Vertical lines
  h+='<div class="ll-lines">';
  s.ll.forEach(()=>{h+='<div class="ll-vline"></div>'});
  h+='</div>';
  // Messages
  h+='<div class="msg-area" id="msgArea">';
  s.steps.forEach((_,i)=>{h+=`<div class="msg-row" id="m${i}"></div>`});
  h+='</div>';
  cv.innerHTML=h;

  // Desc
  let d=`<div class="desc-title">${s.title}</div><div class="desc-sub">${s.sub}</div>`;
  s.steps.forEach((st,i)=>{
    d+=`<div class="ds" id="d${i}"><div class="ds-dot">${i+1}</div><div><div class="ds-text">${st.d}</div>${st.tc?`<div class="ds-tech">${st.tc}</div>`:''}</div></div>`;
  });
  dp.innerHTML=d;
  document.getElementById('slbl').textContent=`0 / ${s.steps.length}`;
  document.getElementById('pfill').style.width='0%';
}

function getX(id){
  const s=SEQ[curSeq],idx=s.ll.findIndex(l=>l.id===id),n=s.ll.length;
  if(idx<0)return 50;
  // percentage based
  return ((idx+0.5)/n)*100;
}

function showStep(i){
  const s=SEQ[curSeq];
  if(i<0||i>=s.steps.length)return;
  const st=s.steps[i],el=document.getElementById('m'+i);
  if(!el)return;
  const fx=getX(st.f),tx=getX(st.t),self=st.f===st.t;
  const c=st.c||'var(--text-muted)';
  let ih='';
  if(self){
    ih=`<div class="self-arrow" style="left:calc(${fx}% - 1px);top:8px;border-color:${c}"></div>`;
    ih+=`<div class="msg-label" style="left:calc(${fx}% + 42px);color:${c}">${st.lb}</div>`;
  }else{
    const left=Math.min(fx,tx),right=Math.max(fx,tx);
    const goRight=tx>fx;
    if(goRight){
      ih=`<div class="arrow-wrap" style="left:calc(${left}%);width:calc(${right-left}%)">`;
      ih+=`<div class="arrow-line" style="background:${c}"></div><div class="arrowhead right" style="border-left-color:${c}"></div></div>`;
    }else{
      ih=`<div class="arrow-wrap" style="left:calc(${left}%);width:calc(${right-left}%)">`;
      ih+=`<div class="arrowhead left" style="border-right-color:${c}"></div><div class="arrow-line rtl" style="background:${c}"></div></div>`;
    }
    ih+=`<div class="msg-label" style="left:calc(${left}% + 8px);color:${c}">${st.lb}</div>`;
  }
  el.innerHTML=ih;
  el.classList.add('visible');
  // Desc
  s.steps.forEach((_,j)=>{
    const de=document.getElementById('d'+j);
    if(de)de.className='ds'+(j===i?' active':(j<i?' done':''));
  });
  document.getElementById('slbl').textContent=`${i+1} / ${s.steps.length}`;
  document.getElementById('pfill').style.width=`${((i+1)/s.steps.length)*100}%`;
  // Scroll
  const ma=document.getElementById('msgArea');
  if(ma){const t=i*48-ma.clientHeight/2+48;ma.scrollTo({top:Math.max(0,t),behavior:'smooth'})}
  const de=document.getElementById('d'+i);
  if(de)de.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function stepFwd(){
  const s=SEQ[curSeq];
  if(curStep<s.steps.length-1){curStep++;showStep(curStep)}
  else stopPlay();
}
function togglePlay(){playing?stopPlay():startPlay()}
function startPlay(){
  playing=true;document.getElementById('playBtn').innerHTML='&#9646;&#9646; Pause';
  (function tick(){if(!playing)return;stepFwd();if(curStep>=SEQ[curSeq].steps.length-1){stopPlay();return}timer=setTimeout(tick,spd)})();
}
function stopPlay(){playing=false;clearTimeout(timer);document.getElementById('playBtn').innerHTML='&#9654; Play'}
function resetSeq(){stopPlay();curStep=-1;render(curSeq)}
function setSpd(b){document.querySelectorAll('.sb').forEach(x=>x.classList.remove('active'));b.classList.add('active');spd=parseInt(b.dataset.s)}

// Tabs
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    if(playing)stopPlay();
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');curSeq=t.dataset.seq;curStep=-1;render(curSeq);
  });
});

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='Enter'){e.preventDefault();togglePlay()}
  else if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();stepFwd()}
  else if(e.key==='r'||e.key==='R')resetSeq();
});

render('lock');
</script>
</body>
</html>
