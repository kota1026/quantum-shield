# =============================================================================
# Quantum Shield - Prometheus Configuration
# =============================================================================
# Metrics collection configuration for all Quantum Shield services.
#
# Targets:
# - API Service (quantum-shield-api)
# - Event Bridge
# - Monitor Bot
# - STARK Prover
# - PostgreSQL (via postgres_exporter)
# - Redis (via redis_exporter)
# - RabbitMQ (via management plugin)
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'quantum-shield-production'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Alert rules
rule_files:
  - /etc/prometheus/alert-rules.yml

# =============================================================================
# Scrape Configurations
# =============================================================================

scrape_configs:
  # ---------------------------------------------------------------------------
  # Prometheus Self-Monitoring
  # ---------------------------------------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # ---------------------------------------------------------------------------
  # API Service Metrics
  # ---------------------------------------------------------------------------
  - job_name: 'quantum-shield-api'
    static_configs:
      - targets: ['api:8080']
    metrics_path: /metrics
    scrape_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'api'

  # ---------------------------------------------------------------------------
  # Event Bridge Metrics
  # ---------------------------------------------------------------------------
  - job_name: 'event-bridge'
    static_configs:
      - targets: ['event-bridge:8081']
    metrics_path: /metrics
    scrape_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'event-bridge'

  # ---------------------------------------------------------------------------
  # Monitor Bot Metrics
  # ---------------------------------------------------------------------------
  - job_name: 'monitor-bot'
    static_configs:
      - targets: ['monitor-bot:9100']
    metrics_path: /metrics
    scrape_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'monitor-bot'

  # ---------------------------------------------------------------------------
  # STARK Prover Metrics
  # ---------------------------------------------------------------------------
  - job_name: 'stark-prover'
    static_configs:
      - targets: ['stark-prover:3000']
    metrics_path: /metrics
    scrape_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'stark-prover'

  # ---------------------------------------------------------------------------
  # RabbitMQ Metrics (via management plugin)
  # ---------------------------------------------------------------------------
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
    metrics_path: /metrics
    scrape_interval: 15s

  # ---------------------------------------------------------------------------
  # L3 Aegis Node Metrics
  # ---------------------------------------------------------------------------
  - job_name: 'aegis-nodes'
    static_configs:
      - targets:
          - 'aegis-node-0:9090'
          - 'aegis-node-1:9090'
          - 'aegis-node-2:9090'
          - 'aegis-node-3:9090'
    metrics_path: /metrics
    scrape_interval: 15s
    relabel_configs:
      - source_labels: [__address__]
        regex: 'aegis-node-(\d+):.*'
        target_label: node_id
        replacement: '${1}'

  # ---------------------------------------------------------------------------
  # Docker Container Metrics (via cAdvisor)
  # ---------------------------------------------------------------------------
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: /metrics
    scrape_interval: 15s

  # ---------------------------------------------------------------------------
  # Node Exporter (Host Metrics)
  # ---------------------------------------------------------------------------
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    metrics_path: /metrics
    scrape_interval: 15s
