# =============================================================================
# Quantum Shield - Development Docker Compose (for GitHub Codespaces)
# =============================================================================
# Lightweight development stack for UI preview and testing:
# - DevContainer (main development environment)
# - PostgreSQL Database
# - Redis Cache
# - RabbitMQ Message Queue
#
# Note: Rust backend services are started manually or via start-services.sh
# =============================================================================

services:
  # ===========================================================================
  # DevContainer - Main Development Environment
  # ===========================================================================
  devcontainer:
    image: mcr.microsoft.com/devcontainers/base:ubuntu-22.04
    container_name: qs-devcontainer
    volumes:
      - ..:/workspace:cached
      - devcontainer-cargo:/home/vscode/.cargo
      - devcontainer-npm:/home/vscode/.npm
    command: sleep infinity
    networks:
      - qs-dev-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      # Database
      - DATABASE_URL=postgres://quantum:quantum_dev@postgres:5432/quantum_shield
      - POSTGRES_USER=quantum
      - POSTGRES_PASSWORD=quantum_dev
      - POSTGRES_DB=quantum_shield
      # Redis
      - REDIS_URL=redis://redis:6379
      # RabbitMQ
      - RABBITMQ_URL=amqp://quantum:quantum_dev@rabbitmq:5672
      # Blockchain (Sepolia testnet - configure your own RPC)
      - L1_RPC_URL=${L1_RPC_URL:-https://rpc.sepolia.org}
      - L3_RPC_URL=${L3_RPC_URL:-http://localhost:8545}
      # Development settings
      - NODE_ENV=development
      - RUST_LOG=debug
      - JWT_SECRET=dev-secret-change-in-production

  # ===========================================================================
  # Infrastructure Services (Lightweight)
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: qs-dev-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=quantum
      - POSTGRES_PASSWORD=quantum_dev
      - POSTGRES_DB=quantum_shield
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    networks:
      - qs-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantum -d quantum_shield"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Redis Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: qs-dev-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-dev-data:/data
    networks:
      - qs-dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 3s

  # ---------------------------------------------------------------------------
  # RabbitMQ Message Queue
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: qs-dev-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=quantum
      - RABBITMQ_DEFAULT_PASS=quantum_dev
      - RABBITMQ_DEFAULT_VHOST=/
    volumes:
      - rabbitmq-dev-data:/var/lib/rabbitmq
    networks:
      - qs-dev-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

# =============================================================================
# Networks
# =============================================================================
networks:
  qs-dev-network:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-dev-data:
  redis-dev-data:
  rabbitmq-dev-data:
  devcontainer-cargo:
  devcontainer-npm:
