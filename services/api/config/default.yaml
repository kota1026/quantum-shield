# Quantum Shield API - Default Configuration

server:
  host: "0.0.0.0"
  port: 8080

database:
  url: "postgres://quantum:quantum_dev@localhost:5432/quantum_shield"
  max_connections: 50
  min_connections: 5
  acquire_timeout_secs: 10
  idle_timeout_secs: 600
  max_lifetime_secs: 1800

redis:
  url: "redis://localhost:6379"
  # password: null  # Set via QS__REDIS__PASSWORD env var

rabbitmq:
  url: "amqp://localhost:5672"
  queue_name: "sig_queue"

jwt:
  secret: "development-secret-change-in-production"
  expiry_hours: 24

security:
  # SEQ#2: Normal Time Lock
  normal_time_lock_hours: 24
  # SEQ#3: Emergency Time Lock
  emergency_time_lock_days: 7
  # SEQ#3: Emergency Timeout (triggers emergency path)
  emergency_timeout_hours: 72
  # SEQ#8: Maximum Pause Duration
  max_pause_duration_hours: 72
  # Emergency Bond minimum (0.5 ETH in wei)
  min_emergency_bond_wei: "500000000000000000"
  # Emergency Bond percentage (500 = 5%)
  emergency_bond_bps: 500

vrf:
  contract_address: "0x0000000000000000000000000000000000000000"
  rpc_url: "http://localhost:8545"
  timeout_seconds: 300
  polling_interval_seconds: 5

# L1 Sepolia Configuration (Phase 8-D)
l1_rpc_url: "https://sepolia.infura.io/v3/REDACTED_INFURA_PROJECT_ID"
l1_chain_id: 11155111
# bridge_verifier_address: "0x..."  # Set when deployed
# treasury_vault_address: "0x..."   # Set when deployed

# L3 Configuration (Phase 8-D)
l3_endpoint: "http://localhost:8545"
l3_chain_id: 31337
