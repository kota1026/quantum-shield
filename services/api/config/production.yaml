# Quantum Shield API - Production Configuration

server:
  host: "0.0.0.0"
  port: 8080

redis:
  url: "redis://redis-cluster:6379"
  # password set via QS__REDIS__PASSWORD env var (FIX-001)

rabbitmq:
  url: "amqp://rabbitmq-cluster:5672"
  queue_name: "sig_queue"

jwt:
  # secret set via QS__JWT__SECRET env var
  expiry_hours: 1

# Security parameters from CORE_PRINCIPLES.md
security:
  normal_time_lock_hours: 24
  emergency_time_lock_days: 7
  emergency_timeout_hours: 72
  max_pause_duration_hours: 72
  min_emergency_bond_wei: "500000000000000000"
  emergency_bond_bps: 500
