[profile.default]
src = "src"
out = "out"
libs = ["lib", "../contracts/lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"

# Remappings
remappings = [
    "@openzeppelin/=../contracts/lib/openzeppelin-contracts/",
    "forge-std/=../contracts/lib/forge-std/src/",
    "@phase2/=../contracts/src/"
]

[fuzz]
runs = 256
max_test_rejects = 65536

[invariant]
runs = 256
depth = 15

fs_permissions = [{ access = "read-write", path = "./" }]
