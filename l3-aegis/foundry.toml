[profile.default]
src = "src"
out = "out"
libs = ["lib", "../contracts/lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 1000
via_ir = true
evm_version = "cancun"

# Stack too deep workaround
[profile.default.optimizer_details]
yul = true

[profile.default.optimizer_details.yul_details]
stack_allocation = true
optimizer_steps = "dhfoDgvulfnTUtnIf"

# Remappings
remappings = [
    "@openzeppelin/=../contracts/lib/openzeppelin-contracts/",
    "forge-std/=../contracts/lib/forge-std/src/",
    "@phase2/=../contracts/src/"
]

[fuzz]
runs = 256
max_test_rejects = 65536

[invariant]
runs = 256
depth = 15

fs_permissions = [{ access = "read-write", path = "./" }]
