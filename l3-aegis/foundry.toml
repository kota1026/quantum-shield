[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"

# Remappings for Phase 2 asset references
remappings = [
    "@openzeppelin/=../lib/openzeppelin-contracts/",
    "forge-std/=../lib/forge-std/src/",
    "@phase2/=../contracts/src/"
]

[fuzz]
runs = 256
max_test_rejects = 65536

[invariant]
runs = 256
depth = 15

# Allow tests to be run from root
[profile.default.fs_permissions]
read = true
write = true
