[package]
name = "zk_dilithium_ntt"
version = "0.1.0"
edition = "2021"

[dependencies]
# Winterfell STARK proving system
winterfell = "0.10"

# Logging
log = "0.4"
env_logger = "0.11"

# Parallel processing for M3 optimization
rayon = "1.10"

# Benchmarking
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "ntt_proof"
harness = false

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
