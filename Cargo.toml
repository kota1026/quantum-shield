[workspace]
members = [
    "client",
    "prover",
    "shared-types",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Quantum Shield Team"]
license = "MIT OR Apache-2.0"

[workspace.dependencies]
# Dilithium
pqcrypto-dilithium = "0.5"
pqcrypto-traits = "0.3"

# Hashing
sha3 = "0.10"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
hex = "0.4"

# Async
tokio = { version = "1", features = ["full"] }

# Web
axum = "0.7"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
